<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Conteúdos · APROVA</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="index.html?c=" id="brandLink"><span class="dot"></span> <span id="studio">APROVA</span></a>
    <span class="topnav"><span class="badge" id="who"></span></span>
  </div>
</header>

<main class="pagepad" id="root"></main>

<!-- CTA fixo: visualizou tudo -->
<div class="ctabar tuck" id="cta">
  <div class="wrap">
    <div><b>Visualizou tudo? 🎉</b><br><span style="font-size:13px;opacity:.9">Avise seu gestor que está aprovado.</span></div>
    <a class="btn nowrap" id="waBtn" target="_blank">Avisar no WhatsApp</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const TOKEN=U.qs("c"), PID=U.qs("p");
let client, project;
const mgr=Data.manager();
document.getElementById("studio").textContent=mgr.studio;
document.getElementById("brandLink").href="index.html?c="+TOKEN;
const SEEN=new Set();

function snap(post){
  const st=STATUS.post[post.status], t=TYPE[post.type];
  return `
  <a class="snapcard reveal" href="post.html?c=${TOKEN}&p=${PID}&post=${post.id}" data-id="${post.id}">
    <div class="cover grad ${post.art} ${t.ratio}">
      <div class="art-noise"></div><div class="veil"></div>
      <div class="type-chip">${U.icon(t.icon)} ${t.label}</div>
      ${post.status==='pendente'?'<div class="new-chip">NOVO</div>':''}
      <div class="cap">
        <span class="badge ${st.cls}" style="margin-bottom:8px"><span class="pip"></span>${st.label}</span>
        <strong style="display:block;font-size:15px;line-height:1.25">${post.title}</strong>
        <span class="meta-sm" style="color:#cfd2da">Publica ${U.fmtDate(post.date)}</span>
      </div>
    </div>
  </a>`;
}

function render(){
  const st=STATUS.project[project.status];
  document.getElementById("who").textContent=project.name;
  document.getElementById("root").innerHTML=`
    <div class="wrap">
      <section class="hello reveal">
        <a class="meta-sm" href="index.html?c=${TOKEN}">← Meus projetos</a>
        <div class="row" style="gap:10px;margin:14px 0 6px">
          <span class="badge ${st.cls} ${st.live?'live':''}"><span class="pip"></span>${st.label}</span>
        </div>
        <h1 class="display" style="font-size:clamp(28px,6vw,46px)">${project.name}</h1>
        <p class="lead" style="margin-top:14px">${project.intro||'Esses são os conteúdos para aprovação, visualização e acompanhamento. Toque em cada um para ver tudo.'}</p>
      </section>
    </div>

    <section class="section">
      <div class="wrap">
        <div class="row between" style="margin-bottom:4px">
          <div class="eyebrow" style="margin:0">Deslize para o lado →</div>
          ${project.posts.length?`<a class="btn btn-sm" href="calendario.html?c=${TOKEN}&p=${PID}">${U.icon('calendar')} Ver tudo</a>`:''}
        </div>
      </div>
      <div class="scroller" id="scroller">
        ${project.posts.map(snap).join("")||'<div class="wrap empty">Conteúdos em breve.</div>'}
      </div>
    </section>
    <div class="wrap"><span class="meta-sm hidden" id="seenInfo"></span><i class="hidden" id="seenBar"></i></div>`;
  U.reveal();
  setupWhats();
  updateSeen();
  watchSeen();
}

function setupWhats(){
  const msg=`Olá ${mgr.name}, acabei de aprovar os conteúdos do projeto "${project.name}"! ✅`;
  document.getElementById("waBtn").href=`https://wa.me/${mgr.whatsapp}?text=${encodeURIComponent(msg)}`;
}

/* marca como "visto" cada card que entra na tela; quando todos foram vistos, sobe o CTA */
function watchSeen(){
  const cards=document.querySelectorAll(".snapcard");
  const io=new IntersectionObserver((es)=>{
    es.forEach(e=>{ if(e.isIntersecting){ SEEN.add(e.target.dataset.id); updateSeen(); } });
  },{threshold:.6});
  cards.forEach(c=>io.observe(c));
}
function updateSeen(){
  const total=project.posts.length;
  const n=Math.min(SEEN.size,total);
  const pct=total?Math.round(n/total*100):0;
  const bar=document.getElementById("seenBar"); if(bar) bar.style.width=pct+"%";
  const info=document.getElementById("seenInfo"); if(info) info.textContent=`${n} de ${total} conteúdos visualizados`;
  document.getElementById("cta").classList.toggle("tuck", !(total>0 && n>=total));
}

function start(){
  client = Data.clientByToken(TOKEN);
  project = client ? Data.project(client.id, PID) : null;
  if(!project){ document.getElementById("root").innerHTML='<div class="wrap empty" style="padding-top:60px">Projeto não encontrado. <a href="index.html?c='+TOKEN+'">Voltar</a></div>'; return; }
  render();
}
U.boot(start);
</script>
</body>
</html>
