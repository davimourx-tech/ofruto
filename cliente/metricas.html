<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>oFruto · Análise de conteúdo</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" id="backLink"><span class="dot"></span> <span id="studio">APROVA</span></a>
    <span class="topnav"><span class="badge" id="who"></span></span>
  </div>
</header>

<main class="wrap pagepad" id="root"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/metrics.js"></script>
<script>
const TOKEN=U.qs("c");
let client;
const mgr=Data.manager();
document.getElementById("studio").textContent=mgr.studio;

function render(){
  const a=(client.dados&&client.dados.analise)||null;
  document.getElementById("who").textContent=client.handle||client.name;
  document.getElementById("backLink").href="index.html?c="+TOKEN;
  if(!a || !a.posts || !a.posts.length){
    document.getElementById("root").innerHTML=`
      <section class="hello reveal">
        <a class="meta-sm" href="index.html?c=${TOKEN}">← Início</a>
        <h1 class="display" style="margin-top:14px">Análise de conteúdo</h1>
        <p class="lead" style="margin-top:14px">Sua análise de desempenho ainda está sendo preparada. Volte em breve. 📊</p>
      </section>`;
    return;
  }
  const resumoHtml = a.resumo ? Metrics.resumoHtml(a.resumo) : '';
  document.getElementById("root").innerHTML=`
    <section class="hello reveal">
      <a class="meta-sm" href="index.html?c=${TOKEN}">← Início</a>
      <div class="eyebrow" style="margin:14px 0 0">Análise de conteúdo · Instagram</div>
      <h1 class="display" style="font-size:clamp(28px,6vw,44px);margin-top:8px">${a.label||'Desempenho'}</h1>
      <p class="lead" style="margin-top:12px">Como seus conteúdos performaram — com um resumo do que funcionou e o caminho a seguir.</p>
    </section>

    ${resumoHtml?`<section class="section reveal">
      <div class="card pad" style="border-left:3px solid var(--red)">
        <div class="row" style="gap:12px;align-items:flex-start;margin-bottom:12px">
          <div class="avatar" style="background:var(--red);flex:none">${U.initials(mgr.name)}</div>
          <div><div class="meta-sm">Resumo de ${mgr.name}</div>
            <strong>${a.label||''}</strong></div>
        </div>
        <div class="caption-box" style="font-size:15px;line-height:1.6">${resumoHtml}</div>
      </div>
    </section>`:''}

    <section class="section reveal">
      <div class="eyebrow" style="margin-bottom:12px">Seus números${a.label?' · '+a.label:''}</div>
      <div id="dash"></div>
    </section>
    <section class="section center reveal" style="padding-top:20px"><p class="dim" style="font-size:13px">${mgr.studio}</p></section>`;
  Metrics.mountSummary(document.getElementById('dash'), a, 6);
  U.reveal();
}

async function start(){
  client=Data.clientByToken(TOKEN);
  if(!client){ document.getElementById("root").innerHTML='<div class="empty" style="padding-top:60px">Link inválido.</div>'; return; }
  render();
}
U.boot(start);
</script>
</body>
</html>
