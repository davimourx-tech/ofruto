<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>oFruto · Conteúdos</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="index.html?c=" id="brandLink"><span class="dot"></span> <span id="studio">APROVA</span></a>
    <span class="topnav"><span class="badge" id="who"></span></span>
  </div>
</header>

<main class="pagepad" id="root"></main>

<!-- CTA fixo: visualizou tudo -->
<div class="ctabar tuck" id="cta">
  <div class="wrap">
    <div><b>Visualizou tudo? 🎉</b><br><span style="font-size:13px;opacity:.9">Avise seu gestor que está aprovado.</span></div>
    <a class="btn nowrap" id="waBtn" target="_blank">Avisar no WhatsApp</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const TOKEN=U.qs("c"), PID=U.qs("p");
let client, project;
const mgr=Data.manager();
document.getElementById("studio").textContent=mgr.studio;
document.getElementById("brandLink").href="index.html?c="+TOKEN;
const DOW=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const MONTHS=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
function postLink(id){ return `post.html?c=${TOKEN}&p=${PID}&post=${id}`; }
function thumb(p){
  if(p.cover){ const cv=U.coverAttrs(p.cover); return `<span class="agenda-thumb ${cv.cls}" style="${cv.style}"></span>`; }
  const t=TYPE[p.type]; return `<span class="agenda-thumb noimg">${U.icon(t.icon)}</span>`;
}
function dateBlock(y,m,d){ const wd=DOW[new Date(y,m-1,d).getDay()];
  return `<div class="agenda-date"><div class="num">${String(d).padStart(2,'0')}</div><div class="mo">${MONTHS[m-1].slice(0,3)} · ${wd}</div></div>`; }
function agendaRow(p, dateHtml){
  const t=TYPE[p.type], st=STATUS.post[p.status], entrega=project.kind==='entrega';
  const tag = entrega ? `<span class="badge">${U.icon('layers')} Material</span>` : `<span class="badge ${st.cls}"><span class="pip"></span>${st.label}</span>`;
  return `<div class="agenda-row reveal">
    ${dateHtml||`<div class="agenda-date"><div class="num">•</div><div class="mo">${entrega?'item':'pauta'}</div></div>`}
    <a class="agenda-post" href="${postLink(p.id)}">
      ${thumb(p)}
      <div class="grow" style="min-width:0">
        <div class="row" style="gap:7px;margin-bottom:5px">${U.icon(t.icon)}<strong style="font-size:14px">${p.title}</strong></div>
        ${tag}
      </div>
      ${U.icon('arrow')}
    </a>
  </div>`;
}
function buildView(){
  if(!project.posts.length) return '<div class="wrap empty">Conteúdos em breve.</div>';
  const byMonth={}, undated=[];
  project.posts.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(p=>{
    if(!p.date){ undated.push(p); return; }
    const [y,m]=p.date.split('-').map(Number), key=y+'-'+m;
    (byMonth[key]=byMonth[key]||{y,m,days:{}});
    const day=Number(p.date.split('-')[2]);
    (byMonth[key].days[day]=byMonth[key].days[day]||[]).push(p);
  });
  let rows='';
  Object.values(byMonth).forEach(mo=>{
    Object.keys(mo.days).map(Number).sort((a,b)=>a-b).forEach(d=>{
      mo.days[d].forEach(p=> rows+=agendaRow(p, dateBlock(mo.y,mo.m,d)));
    });
  });
  if(undated.length){
    if(rows) rows+=`<div class="eyebrow" style="margin:20px 0 10px">Sem data definida</div>`;
    undated.forEach(p=> rows+=agendaRow(p, null));
  }
  return `<div class="wrap"><div class="agenda">${rows}</div></div>`;
}

function deadlineBanner(){
  if(!project.deadline) return '';
  const noun = project.kind==='planejamento' ? 'as pautas pendentes' : 'os conteúdos pendentes';
  const d=U.daysLeft(project.deadline), dateStr=U.fmtDate(project.deadline);
  if(d>=0){
    return `<div class="card pad reveal" style="background:var(--amber-soft);border-color:rgba(255,176,32,.3)">
      <div class="row" style="gap:12px;align-items:flex-start">
        <span style="color:var(--amber)">${U.icon('clock')}</span>
        <div><strong style="color:#ffd98a">Prazo de aprovação até ${dateStr}</strong>
        <div class="meta-sm" style="margin-top:3px;color:#ffe7b3">${d===0?'Último dia!':'Faltam '+d+' dia'+(d>1?'s':'')+'.'} Sem resposta até lá, seguimos com o que está planejado.</div></div>
      </div></div>`;
  }
  return `<div class="card pad reveal" style="background:var(--green-soft);border-color:rgba(40,208,123,.3)">
      <div class="row" style="gap:12px;align-items:flex-start">
        <span style="color:var(--green)">${U.icon('check')}</span>
        <div><strong style="color:#7ef0b6">Prazo encerrado (${dateStr})</strong>
        <div class="meta-sm" style="margin-top:3px;color:#a9f0cd">Como não houve resposta, ${noun} foram aprovados automaticamente.</div></div>
      </div></div>`;
}

function render(){
  const st=STATUS.project[project.status];
  const plan=project.kind==='planejamento', entrega=project.kind==='entrega';
  const introDefault = entrega ? 'Materiais e entregáveis do seu projeto. Toque em cada um para abrir.'
    : plan ? 'Esse é o nosso planejamento de conteúdos. Veja cada pauta, aprove, peça ajustes ou deixe um palpite.'
    : 'Esses são os conteúdos para aprovação, visualização e acompanhamento. Toque em cada um para ver tudo.';
  const eyebrow = entrega ? 'Materiais' : plan ? 'Pautas por data' : 'Conteúdos por data';
  document.getElementById("who").textContent=project.name;
  document.getElementById("root").innerHTML=`
    <div class="wrap">
      <section class="hello reveal">
        <a class="meta-sm" href="index.html?c=${TOKEN}">← Meus projetos</a>
        <div class="row wrap" style="gap:10px;margin:14px 0 6px">
          <span class="badge ${st.cls} ${st.live?'live':''}"><span class="pip"></span>${st.label}</span>
          ${plan?`<span class="badge">${U.icon('idea')} Planejamento</span>`:''}
          ${entrega?`<span class="badge">${U.icon('layers')} Entregável</span>`:''}
        </div>
        <h1 class="display" style="font-size:clamp(28px,6vw,46px)">${project.name}</h1>
        <p class="lead" style="margin-top:14px">${project.intro||introDefault}</p>
        ${project.deadline?`<div style="margin-top:18px">${deadlineBanner()}</div>`:''}
      </section>
    </div>

    <section class="section">
      <div class="wrap"><div class="eyebrow" style="margin:0 0 14px">${eyebrow}</div></div>
      ${buildView()}
      <div class="wrap"><div id="endSentinel" style="height:1px"></div></div>
    </section>`;
  U.reveal();
  setupWhats();
  if(!entrega) watchEnd();   // entregável não tem fluxo de "avisar que aprovou"
}

function setupWhats(){
  const msg=`Olá ${mgr.name}, acabei de aprovar os conteúdos do projeto "${project.name}"! ✅`;
  document.getElementById("waBtn").href=`https://wa.me/${mgr.whatsapp}?text=${encodeURIComponent(msg)}`;
}

/* mostra o CTA do WhatsApp quando o cliente chega ao fim da lista */
function watchEnd(){
  const s=document.getElementById("endSentinel"); if(!s) return;
  const io=new IntersectionObserver((es)=>{ es.forEach(e=>{
    if(e.isIntersecting) document.getElementById("cta").classList.remove("tuck");
  }); },{threshold:.4});
  io.observe(s);
}

async function start(){
  client = Data.clientByToken(TOKEN);
  project = client ? Data.project(client.id, PID) : null;
  if(!project){ document.getElementById("root").innerHTML='<div class="wrap empty" style="padding-top:60px">Projeto não encontrado. <a href="index.html?c='+TOKEN+'">Voltar</a></div>'; return; }
  await Store.applyDeadline(project);
  render();
}
U.boot(start);
</script>
</body>
</html>
