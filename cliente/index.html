<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>oFruto · Sua área de conteúdos</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <span class="brand"><span class="dot"></span> <span id="studio">APROVA</span></span>
    <span class="topnav"><span class="badge" id="who"></span></span>
  </div>
</header>

<main class="wrap pagepad" id="root"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const TOKEN=U.qs("c");
let client;
const mgr=Data.manager();
document.getElementById("studio").textContent=mgr.studio;

function projectCard(p){
  const st=STATUS.project[p.status];
  const pr=Data.projectProgress(p);
  const clickable = p.status!=="breve";
  const cv=U.coverAttrs(p.cover || (p.posts[0]&&p.posts[0].cover) || 'art-6');
  const kindTag = p.kind==='entrega' ? `${U.icon('layers')} Entregável` : p.kind==='planejamento' ? `${U.icon('idea')} Planejamento` : `${U.icon(st.live?'clock':'star')} ${st.label}`;
  const unit = p.kind==='entrega' ? 'materiais' : p.kind==='planejamento' ? 'pautas' : 'conteúdos';
  const inner=`
    <div class="${cv.cls} ratio-16-9" style="border-radius:var(--r-lg);${cv.style}">
      <div class="art-noise"></div>
      <div class="veil"></div>
      <div class="type-chip">${kindTag}</div>
      <div class="cap">
        <strong style="font-size:19px;display:block">${p.name}</strong>
        <span class="meta-sm" style="color:#cfd2da">${pr.total} ${unit}${(p.status==='pronto'&&p.kind!=='entrega')?` · ${pr.ok} aprovados`:''}</span>
      </div>
    </div>`;
  if(clickable){
    return `<a class="card hover reveal" style="overflow:hidden" href="projeto.html?c=${TOKEN}&p=${p.id}">${inner}</a>`;
  }
  return `<div class="card reveal" style="overflow:hidden;opacity:.6">${inner}</div>`;
}

function render(){
  const first=client.name.split(" ")[0];
  document.getElementById("who").textContent=client.handle;
  const visible=client.projects;
  document.getElementById("root").innerHTML=`
    <section class="hello reveal">
      <div class="wave">👋</div>
      <h1 class="display" style="margin-top:10px">Oi, ${first}.<br><span style="color:var(--text-2);font-weight:400">${cap(U.greet())}!</span></h1>
      <p class="lead" style="margin-top:14px">Qual projeto vamos visualizar hoje?</p>
    </section>

    ${client.message?`<section class="section reveal">
      <div class="card pad" style="background:var(--surface-2);border-left:3px solid var(--red)">
        <div class="row" style="gap:12px;align-items:flex-start">
          <div class="avatar" style="background:var(--red);flex:none">${U.initials(mgr.name)}</div>
          <div><div class="meta-sm" style="margin-bottom:4px">Recado de ${mgr.name}</div>
          <p>${client.message}</p></div>
        </div>
      </div>
    </section>`:''}

    ${clientAgenda()}
    ${clientReports()}

    <section class="section">
      <div class="eyebrow">Seus projetos</div>
      <div class="grid c2 stagger">
        ${visible.map(projectCard).join("")||'<div class="empty card pad">Nenhum projeto disponível ainda.</div>'}
      </div>
    </section>

    <section class="section center reveal" style="padding-top:30px">
      <p class="dim" style="font-size:13px">${mgr.studio}</p>
    </section>`;
  U.reveal();
}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function clientAgenda(){
  const today=new Date().toISOString().slice(0,10);
  const evs=Data.eventsOfClient(client.id).filter(e=>e.date>=today)
    .sort((a,b)=>(a.date+(a.time||'')).localeCompare(b.date+(b.time||''))).slice(0,5);
  if(!evs.length) return '';
  const LB={gravacao:'Gravação',reuniao:'Reunião',outro:'Evento'};
  const rows=evs.map(e=>{ const [y,m,d]=e.date.split('-').map(Number);
    return `<div class="agenda-row">
      <div class="agenda-date"><div class="num">${String(d).padStart(2,'0')}</div><div class="mo">${MONTHS_FULL[m-1].slice(0,3)}</div></div>
      <div class="agenda-post" style="cursor:default">
        <div class="grow" style="min-width:0"><div class="row" style="gap:7px;margin-bottom:4px">${U.icon('calendar')}<strong style="font-size:14px">${e.title}</strong></div>
        <span class="meta-sm">${e.time?e.time+' · ':''}${LB[e.type]||'Evento'}${e.note?' · '+e.note:''}</span></div>
      </div></div>`; }).join('');
  return `<section class="section reveal"><div class="eyebrow">Sua agenda</div><div class="agenda">${rows}</div></section>`;
}
function clientReports(){
  const MES=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
  const rs=(client.reports||[]).filter(r=>r.published).sort((a,b)=>b.month.localeCompare(a.month));
  if(!rs.length) return '';
  const cards=rs.map(r=>{ const [y,m]=r.month.split('-');
    return `<a class="card hover pad row between" href="relatorio.html?c=${TOKEN}&m=${r.month}">
      <div class="row" style="gap:12px">${U.icon('chart')}<strong style="text-transform:capitalize">${MES[Number(m)-1]} ${y}</strong></div>
      ${U.icon('arrow')}</a>`; }).join('');
  return `<section class="section reveal"><div class="eyebrow">Seus relatórios</div><div class="col" style="gap:10px">${cards}</div></section>`;
}

function start(){
  client = Data.clientByToken(TOKEN);
  if(!client){ document.getElementById("root").innerHTML='<section class="section center" style="padding-top:60px"><h1 class="display">Link inválido</h1><p class="lead" style="margin:14px auto">Esse link de visualização não foi encontrado. Peça um novo ao seu gestor.</p></section>'; return; }
  render();
}
U.boot(start);
</script>
</body>
</html>
