<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>oFruto · Operacional do cliente</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="hub.html"><span class="dot"></span> oFruto <small>gestor</small></a>
    <nav class="topnav" id="crumbs"></nav>
  </div>
</header>

<main class="wrap pagepad" id="root"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const CID=U.qs("c");
let client;
const STAGES=(window.APP_CONFIG&&APP_CONFIG.PROD_STAGES)||["Ideia","Roteiro","Edição","Pronto"];
const TEAM=(window.APP_CONFIG&&APP_CONFIG.TEAM)||["Davi Moura"];
const DONE=STAGES[STAGES.length-1];

function stageOpts(cur){ return `<option value="">— etapa —</option>`+STAGES.map(s=>`<option ${cur===s?'selected':''}>${s}</option>`).join(''); }
function respOpts(cur){ return `<option value="">— responsável —</option>`+TEAM.map(m=>`<option ${cur===m?'selected':''}>${m}</option>`).join(''); }

function contentRow(pid,post){
  const t=TYPE[post.type];
  const done=post.prod===DONE;
  return `<div class="task-row" style="gap:10px;flex-wrap:wrap">
    <div class="row" style="gap:10px;min-width:180px">
      ${done?`<span class="badge is-aprovado"><span class="pip"></span>Pronto</span>`:`<span class="badge is-ajustes"><span class="pip"></span>Em produção</span>`}
      <div class="col" style="min-width:0"><strong style="font-size:13.5px">${post.title}</strong>
        <span class="meta-sm">${t.label}${post.pilar?' · '+post.pilar:''}${post.date?' · '+U.fmtDate(post.date):''}</span></div>
    </div>
    <div class="row grow" style="gap:8px;justify-content:flex-end">
      <select class="input" style="width:auto;padding:7px 9px" onchange="setEtapa('${pid}','${post.id}',this.value)">${stageOpts(post.prod)}</select>
      <select class="input" style="width:auto;padding:7px 9px" onchange="setResp('${pid}','${post.id}',this.value)">${respOpts(post.responsavel)}</select>
    </div>
  </div>`;
}

function projectCard(p){
  const st=STATUS.project[p.status];
  const total=p.posts.length, done=p.posts.filter(x=>x.prod===DONE).length;
  const dl=U.daysLeft(p.prazo);
  return `<div class="card pad">
    <div class="row between wrap" style="gap:14px;margin-bottom:12px">
      <div>
        <div class="row wrap" style="gap:8px;margin-bottom:8px">
          <span class="badge ${st.cls}"><span class="pip"></span>${st.label}</span>
          ${p.kind==='planejamento'?`<span class="badge">${U.icon('idea')} Planejamento</span>`:''}
          <span class="badge">${done}/${total} prontos</span>
          ${p.prazo?`<span class="badge ${dl<0?'is-reprovado':(dl<=3?'is-ajustes':'')}"><span class="pip"></span>${dl<0?'atrasado':'faltam '+dl+'d'}</span>`:''}
        </div>
        <strong style="font-size:17px">${p.name}</strong>
      </div>
      <a class="btn btn-sm card nowrap" href="projeto.html?c=${CID}&p=${p.id}">Abrir projeto ${U.icon('arrow')}</a>
    </div>
    <div class="row wrap" style="gap:12px;margin-bottom:10px">
      <label class="meta-sm" style="display:flex;flex-direction:column;gap:4px">Prazo de produção
        <input class="input" type="date" style="width:auto" value="${p.prazo||''}" onchange="setPrazo('${p.id}',this.value)"></label>
      <label class="meta-sm" style="display:flex;flex-direction:column;gap:4px">Responsável do projeto
        <select class="input" style="width:auto" onchange="setProjResp('${p.id}',this.value)">${respOpts(p.responsavel)}</select></label>
    </div>
    <div class="col">${p.posts.length?p.posts.map(x=>contentRow(p.id,x)).join(''):'<p class="meta-sm">Sem conteúdos.</p>'}</div>
  </div>`;
}

function render(){
  document.getElementById("crumbs").innerHTML=`<a href="operacional.html">← Operacional</a>`;
  const projs=client.projects.filter(p=>p.kind!=='entrega');
  document.getElementById("root").innerHTML=`
    <section class="section">
      <a class="meta-sm" href="operacional.html">← Todos (operacional)</a>
      <div class="eyebrow" style="margin:16px 0 0">Operacional</div>
      <div class="row" style="gap:18px;margin-top:8px">${U.avatarHtml(client,'lg')}
        <div class="col"><h1 class="display" style="font-size:clamp(26px,4.5vw,40px)">${client.name}</h1>
          <span class="muted">Produção · etapas, prazos e responsáveis</span></div></div>
    </section>
    <section class="section">
      <div class="col stagger" style="gap:16px">
        ${projs.length?projs.map(projectCard).join(''):'<div class="empty card pad">Nenhum projeto de conteúdo ainda.</div>'}
      </div>
    </section>`;
  U.reveal();
}

async function setEtapa(pid,id,val){ await Store.setPostMeta(CID,pid,id,{prod:val}); render(); }
async function setResp(pid,id,val){ await Store.setPostMeta(CID,pid,id,{responsavel:val}); U.toast('Responsável atualizado'); }
async function setPrazo(pid,val){ await Store.setProjectMeta(CID,pid,{prazo:val||null}); U.toast('Prazo atualizado'); render(); }
async function setProjResp(pid,val){ await Store.setProjectMeta(CID,pid,{responsavel:val}); U.toast('Responsável do projeto atualizado'); }

function start(){
  client=Data.client(CID);
  if(!client){ document.getElementById("root").innerHTML='<div class="empty" style="padding-top:60px">Cliente não encontrado. <a href="operacional.html">Voltar</a></div>'; return; }
  render();
}
U.boot(start, {manager:true});
</script>
</body>
</html>
