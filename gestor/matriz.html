<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>oFruto · Matriz</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="workspace.html"><span class="dot"></span> oFruto <small>gestor</small></a>
    <nav class="topnav" id="crumbs"></nav>
  </div>
</header>

<main class="wrap pagepad" id="root"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const CID=U.qs("c");
let client, PILARES=[];
const now=new Date();
const DIAS_SHORT=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const TIPOS_MATRIZ=[
  { k:'organico',  t:'Orgânico',  d:'Conteúdo por conteúdo. Atrai pessoas novas (audiência que ainda não segue).' },
  { k:'marketing', t:'Marketing', d:'Faz marketing do serviço. Gera valor, mostra o método e aquece quem já acompanha.' },
  { k:'venda',     t:'Venda',     d:'Vende o serviço direto. Oferta, prova e chamada pra fechar.' }
];
const TIPO_LBL={organico:'Orgânico',marketing:'Marketing',venda:'Venda',atrair:'Orgânico',conectar:'Marketing',converter:'Venda',reter:'Venda'};
function tipoOf(p){ return p.tipo || {atrair:'organico',conectar:'marketing',converter:'venda',reter:'venda'}[p.etapa] || 'organico'; }

function pilarCard(p){
  const meta=[TIPO_LBL[tipoOf(p)], (p.formatos||[])[0], (p.dias&&p.dias.length)?p.dias.slice().sort((a,b)=>a-b).map(i=>DIAS_SHORT[i]).join(', '):'sem dias'].filter(Boolean).join(' · ');
  const nm=(p.nome||'Sem nome').replace(/</g,'&lt;');
  return `<div class="card pad row between" style="cursor:pointer" onclick="openFormato('${p.id}')">
    <div class="col" style="min-width:0"><strong>${nm}</strong>
      <span class="meta-sm">${meta}</span></div>
    <div class="row" style="gap:8px" onclick="event.stopPropagation()">
      <button class="btn-icon card" title="Editar" onclick="editFormato('${p.id}')">${U.icon('edit')}</button>
      <button class="btn-icon card" title="Excluir" onclick="delFormato('${p.id}')">${U.icon('trash')}</button>
    </div>
  </div>`;
}
function openFormato(id){ location.href=`matriz-pilar.html?c=${CID}&id=${id}`; }
function editFormato(id){ location.href=`matriz-pilar.html?c=${CID}&id=${id}&edit=1`; }
async function delFormato(id){ if(!confirm('Excluir este formato?')) return;
  PILARES=PILARES.filter(x=>x.id!==id); await Store.setPilares(CID, PILARES); render(); U.toast('Formato excluído'); }

function weekPreview(){
  const withDays=PILARES.filter(p=>p.dias&&p.dias.length);
  if(!withDays.length) return '<p class="meta-sm">Nenhum formato com dias ainda. Crie um formato e escolha os dias que ele sai.</p>';
  return `<div class="wk">${DIAS_SHORT.map((d,i)=>{
    const items=withDays.filter(p=>(p.dias||[]).includes(i));
    return `<div class="wk-day">
      <div class="wk-h">${d}</div>
      ${items.length?items.map(p=>`<span class="wk-item t-${tipoOf(p)}" title="${(p.formatos||[])[0]||''}">${p.nome||'Formato'}</span>`).join(''):'<span class="wk-empty">—</span>'}
    </div>`;
  }).join('')}</div>`;
}

function balanceHtml(){
  const withDays=PILARES.filter(p=>p.dias&&p.dias.length);
  let tot=0; const by={organico:0,marketing:0,venda:0};
  withDays.forEach(p=>{ const n=(p.dias||[]).length; by[tipoOf(p)]+=n; tot+=n; });
  if(!tot) return '';
  const cells=TIPOS_MATRIZ.map(x=>{
    const n=by[x.k], pct=Math.round(n/tot*100);
    return `<div class="col grow" style="gap:6px;min-width:120px">
      <div class="row between"><span class="meta-sm" style="color:var(--text)">${x.t}</span><span class="meta-sm">${n}/sem · ${pct}%</span></div>
      <div class="bal"><i style="width:${pct}%"></i></div></div>`;
  }).join('');
  return `<div class="row wrap" style="gap:18px;margin-bottom:18px">${cells}</div>`;
}

let GEN_COVER='';
function isoOf(dt){ return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }
function rangeCount(){
  const fEl=document.getElementById('genFrom'), tEl=document.getElementById('genTo');
  if(!fEl||!tEl) return 0;
  const withDays=PILARES.filter(p=>p.dias&&p.dias.length);
  if(!fEl.value||!tEl.value||!withDays.length) return 0;
  let a=new Date(fEl.value+'T12:00:00'), b=new Date(tEl.value+'T12:00:00'); if(b<a) return 0;
  let n=0; const cur=new Date(a);
  while(cur<=b){ const wd=cur.getDay(); n+=withDays.filter(p=>(p.dias||[]).includes(wd)).length; cur.setDate(cur.getDate()+1); }
  return n;
}
function refreshCount(){ const el=document.getElementById('genCount'); if(el) el.textContent=rangeCount()+' pautas serão criadas'; }
async function genCoverUp(input){ const f=input.files[0]; if(!f) return;
  U.toast('Enviando capa...'); const url=await Store.uploadCover(f); input.value='';
  if(url){ GEN_COVER=url; const el=document.getElementById('genCoverPrev');
    el.className='proj-thumb'; el.style.cssText='background-image:url("'+url+'");background-size:cover;background-position:center'; el.innerHTML=''; U.toast('Capa pronta ✅'); } }
function genCoverClear(){ GEN_COVER=''; const el=document.getElementById('genCoverPrev'); if(el){ el.className='proj-thumb noimg'; el.style.cssText=''; el.innerHTML=U.icon('image'); } }

function render(){
  document.getElementById("crumbs").innerHTML=`<a href="cliente.html?c=${CID}">← ${client.name}</a>`;
  const monthOpts=MONTHS_FULL.map((m,i)=>`<option value="${i}" ${i===now.getMonth()?'selected':''}>${m.charAt(0).toUpperCase()+m.slice(1)}</option>`).join('');
  document.getElementById("root").innerHTML=`
    <section class="section">
      <a class="meta-sm" href="cliente.html?c=${CID}">← ${client.name}</a>
      <div class="eyebrow" style="margin:16px 0 0">Matriz de conteúdo</div>
      <h1 class="display" style="font-size:clamp(28px,5vw,44px);margin-top:8px">${client.name}</h1>
    </section>

    <section class="section" style="max-width:820px;padding-top:0">
      <div class="card pad">
        <div class="row between" style="margin-bottom:14px">
          <div><strong>Formatos</strong><div class="meta-sm">Cada formato tem função, dias e roteiro-guia. Clique pra ver.</div></div>
          <button class="btn btn-sm card" onclick="addPilar()">${U.icon('plus')} Formato</button>
        </div>
        <div class="grid c2" style="gap:12px">${PILARES.length?PILARES.map(pilarCard).join(''):'<p class="meta-sm">Nenhum formato ainda. Clique em “Formato” para criar.</p>'}</div>
      </div>
    </section>

    <section class="section" style="max-width:820px;padding-top:0">
      <div class="card pad">
        <strong>A semana</strong>
        <div style="margin:14px 0 4px">${balanceHtml()}</div>
        ${weekPreview()}
      </div>
    </section>

    <section class="section" style="max-width:820px;padding-top:0">
      <div class="card pad" style="background:var(--surface-2)">
        <div class="eyebrow" style="margin-bottom:14px">${U.icon('calendar')} Gerar o mês</div>
        <div class="grid c2" style="gap:12px">
          <div class="field"><label>Nome do projeto</label>
            <input class="input" id="genName" value="Conteúdos de ${MONTHS_FULL[now.getMonth()].charAt(0).toUpperCase()+MONTHS_FULL[now.getMonth()].slice(1)} ${now.getFullYear()}"></div>
          <div class="field"><label>Tipo</label>
            <select class="input" id="genKind">
              <option value="planejamento">Planejamento (escrever roteiros)</option>
              <option value="conteudo">Conteúdo</option>
            </select></div>
          <div class="field"><label>De</label><input class="input" id="genFrom" type="date" value="${isoOf(now)}" onchange="refreshCount()"></div>
          <div class="field"><label>Até</label><input class="input" id="genTo" type="date" value="${isoOf(new Date(now.getFullYear(),now.getMonth()+1,0))}" onchange="refreshCount()"></div>
        </div>
        <div class="field"><label>Capa do projeto (opcional)</label>
          <div class="row" style="gap:12px;align-items:center">
            <div class="proj-thumb ${GEN_COVER?'':'noimg'}" id="genCoverPrev" ${GEN_COVER?`style="background-image:url('${GEN_COVER}');background-size:cover;background-position:center"`:''}>${GEN_COVER?'':U.icon('image')}</div>
            <label class="btn btn-sm card" for="genCoverFile" style="cursor:pointer">${U.icon('upload')} Enviar capa</label>
            <input type="file" id="genCoverFile" accept="image/*" class="hidden" onchange="genCoverUp(this)">
            <button type="button" class="btn btn-sm btn-ghost" onclick="genCoverClear()">Sem capa</button>
          </div>
        </div>
        <label class="row" style="gap:9px;cursor:pointer;margin-top:6px">
          <input type="checkbox" id="genVisivel">
          <span class="meta-sm">Deixar visível pro cliente agora (senão nasce oculto até você liberar)</span></label>
        <div class="row wrap" style="gap:12px;align-items:center;margin-top:10px">
          <button class="btn btn-primary" onclick="gerar()">${U.icon('sparkle')} Gerar</button>
          <span class="meta-sm" id="genCount"></span>
        </div>
        <p class="hint" style="margin-top:8px">Cria o projeto com as pautas datadas pelos dias de cada formato, no período escolhido. Cada pauta já nasce com o briefing puxado do formato — é só escrever o roteiro.</p>
      </div>
    </section>`;
  refreshCount();
}

function addPilar(){
  /* não persiste vazio — só abre o editor. O formato só é salvo quando você clica em Salvar. */
  const id='p'+Date.now()+Math.random().toString(36).slice(2,5);
  location.href=`matriz-pilar.html?c=${CID}&id=${id}&edit=1`;
}

async function gerar(){
  const withDays=PILARES.filter(p=>p.dias&&p.dias.length);
  if(!withDays.length){ U.toast('Crie um formato com dias primeiro'); return; }
  const from=document.getElementById('genFrom').value, to=document.getElementById('genTo').value;
  const name=document.getElementById('genName').value.trim();
  const kind=document.getElementById('genKind').value;
  const visivel=document.getElementById('genVisivel').checked;
  if(!from||!to){ U.toast('Escolha o período'); return; }
  const n=rangeCount();
  if(!n){ U.toast('Nenhuma pauta nesse período'); return; }
  if(!confirm(`Gerar ${n} pautas de ${U.fmtDate(from)} até ${U.fmtDate(to)}?`)) return;
  try{
    const res=await Store.generateMonthFromFormats(CID, { from, to, name, kind, cover:GEN_COVER, visivel });
    U.toast(`Gerado: ${res.count} pautas ✨`);
    location.href=`projeto.html?c=${CID}&p=${res.project.id}`;
  }catch(e){ alert('Não deu pra gerar: '+e.message); }
}

function start(){
  client=Data.client(CID);
  if(!client){ document.getElementById("root").innerHTML='<div class="empty" style="padding-top:60px">Cliente não encontrado. <a href="workspace.html">Voltar</a></div>'; return; }
  PILARES=(client.pilares||[]).map(p=>Object.assign({},p));
  render();
}
U.boot(start, {manager:true});
</script>
</body>
</html>
