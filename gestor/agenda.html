<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>oFruto · Agenda</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="hub.html"><span class="dot"></span> oFruto <small>gestor</small></a>
    <nav class="topnav"><a href="hub.html">← Hub</a></nav>
  </div>
</header>

<main class="wrap pagepad" id="root"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const EVT={ gravacao:{label:'Gravação',icon:'film'}, reuniao:{label:'Reunião',icon:'chat'}, outro:{label:'Outro',icon:'calendar'} };
const PRESET_CID = U.qs("c");   // se abrir a partir de um cliente, já vem pré-selecionado
function v(id){ return document.getElementById(id).value; }

function eventRow(ev){
  const c=ev.client_id?Data.client(ev.client_id):null;
  const t=EVT[ev.type]||EVT.outro;
  const [y,m,d]=(ev.date||'').split('-').map(Number);
  return `<div class="agenda-row reveal">
    <div class="agenda-date"><div class="num">${String(d||0).padStart(2,'0')}</div><div class="mo">${m?MONTHS_FULL[m-1].slice(0,3):''}</div></div>
    <div class="agenda-post" style="cursor:default">
      <div class="grow" style="min-width:0">
        <div class="row" style="gap:8px;margin-bottom:4px">${U.icon(t.icon)}<strong style="font-size:14px">${ev.title}</strong></div>
        <span class="meta-sm">${ev.time?ev.time+' · ':''}${t.label}${c?' · '+c.name:''}${ev.note?' · '+ev.note:''}</span>
      </div>
      <div class="row" style="gap:8px">
        ${ev.client_id?`<a class="btn-icon card" href="#" onclick="avisar('${ev.id}');return false" title="Avisar cliente no WhatsApp">${U.icon('whats')}</a>`:''}
        <a class="btn-icon card" target="_blank" rel="noopener" href="${U.gcalUrl(ev)}" title="Adicionar ao Google Calendar">${U.icon('calendar')}</a>
        <button class="btn-icon card" onclick="delEvent('${ev.id}')" title="Excluir">${U.icon('trash')}</button>
      </div>
    </div>
  </div>`;
}

function render(){
  const todayStr=new Date().toISOString().slice(0,10);
  const all=Data.events().slice().sort((a,b)=>(a.date+ (a.time||'')).localeCompare(b.date+(b.time||'')));
  const prox=all.filter(e=>e.date>=todayStr);
  const past=all.filter(e=>e.date<todayStr).reverse();
  const clientOpts=`<option value="">— sem cliente —</option>`+Data.activeClients().map(c=>`<option value="${c.id}" ${c.id===PRESET_CID?'selected':''}>${c.name}</option>`).join('');

  document.getElementById("root").innerHTML=`
    <section class="section">
      <div class="eyebrow">Agenda</div>
      <h1 class="display" style="font-size:clamp(28px,5vw,44px)">Gravações & reuniões</h1>
    </section>

    <section class="section" style="max-width:760px">
      <div class="card pad">
        <div class="eyebrow" style="margin-bottom:14px">Novo evento</div>
        <div class="grid c2">
          <div class="field" style="grid-column:1/-1"><label>Título</label>
            <input class="input" id="e-title" placeholder="Ex.: Gravação de Reels — Julho"></div>
          <div class="field"><label>Data</label><input class="input" id="e-date" type="date" value="${todayStr}"></div>
          <div class="field"><label>Hora (opcional)</label><input class="input" id="e-time" type="time"></div>
          <div class="field"><label>Tipo</label>
            <select class="input" id="e-type">
              <option value="gravacao">Gravação</option>
              <option value="reuniao" selected>Reunião</option>
              <option value="outro">Outro</option>
            </select></div>
          <div class="field"><label>Cliente (opcional)</label>
            <select class="input" id="e-client">${clientOpts}</select></div>
          <div class="field" style="grid-column:1/-1"><label>Local / observação</label>
            <input class="input" id="e-note" placeholder="Ex.: Estúdio X, ou link da call"></div>
        </div>
        <button class="btn btn-primary" onclick="addEvent()">${U.icon('plus')} Adicionar evento</button>
        <p class="hint" style="margin-top:8px">Depois de criar, use o ícone de calendário pra jogar o evento no seu Google Calendar.</p>
      </div>
    </section>

    <section class="section" style="max-width:760px">
      <h2 class="display" style="font-size:22px;margin-bottom:14px">Próximos</h2>
      <div class="agenda">${prox.length?prox.map(eventRow).join(''):'<p class="meta-sm">Nenhum evento futuro.</p>'}</div>
      ${past.length?`<h2 class="display" style="font-size:20px;margin:26px 0 14px;color:var(--text-3)">Anteriores</h2>
      <div class="agenda" style="opacity:.6">${past.slice(0,20).map(eventRow).join('')}</div>`:''}
    </section>`;
  U.reveal();
}

async function addEvent(){
  const title=v('e-title').trim(), date=v('e-date');
  if(!title||!date){ U.toast('Título e data são obrigatórios'); return; }
  await Store.addEvent({ title, date, time:v('e-time'), type:v('e-type'), client_id:v('e-client')||null, note:v('e-note').trim() });
  U.toast('Evento adicionado'); render();
}
async function delEvent(id){ if(!confirm('Excluir este evento?')) return; await Store.deleteEvent(id); U.toast('Excluído'); render(); }
function avisar(id){
  const ev=Data.events().find(x=>x.id===id); if(!ev||!ev.client_id) return;
  const c=Data.client(ev.client_id); if(!c) return;
  const tel=((c.finance&&c.finance.telefone)||(c.dados&&c.dados.telefone)||'').replace(/\D/g,'');
  if(!tel){ U.toast('Cliente sem telefone (preencha em Dados)'); return; }
  const tl={gravacao:'gravação',reuniao:'reunião',outro:'compromisso'}[ev.type]||'compromisso';
  const quando=U.fmtDate(ev.date)+(ev.time?' às '+ev.time:'');
  const msg=`Olá ${c.name.split(' ')[0]}! Passando pra confirmar nossa ${tl}: ${ev.title} — ${quando}${ev.note?' ('+ev.note+')':''}. Até lá! — ${MANAGER.studio}`;
  window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`,'_blank');
}

U.boot(render, {manager:true});
</script>
</body>
</html>
