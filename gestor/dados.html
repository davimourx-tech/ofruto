<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>oFruto · Dados do cliente</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="hub.html"><span class="dot"></span> oFruto <small>gestor</small></a>
    <nav class="topnav" id="crumbs"></nav>
  </div>
</header>

<main class="wrap pagepad" id="root"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const CID=U.qs("c");
let client, DADOS={}, ACESSOS=[];

function v(id){ return document.getElementById(id).value; }

function acessoRow(a,i){
  return `<div class="task-row" style="gap:10px;flex-wrap:wrap">
    <input class="input" style="width:130px" value="${(a.rede||'').replace(/"/g,'&quot;')}" placeholder="Rede" oninput="edA(${i},'rede',this.value)">
    <input class="input grow" style="min-width:120px" value="${(a.login||'').replace(/"/g,'&quot;')}" placeholder="Login / usuário" oninput="edA(${i},'login',this.value)">
    <input class="input grow" style="min-width:120px" value="${(a.senha||'').replace(/"/g,'&quot;')}" placeholder="Senha" oninput="edA(${i},'senha',this.value)">
    <button class="btn-icon card" onclick="delA(${i})" title="Remover">${U.icon('trash')}</button>
  </div>`;
}

function render(){
  document.getElementById("crumbs").innerHTML=`<a href="cliente.html?c=${CID}">← ${client.name}</a>`;
  document.getElementById("root").innerHTML=`
    <section class="section">
      <a class="meta-sm" href="cliente.html?c=${CID}">← ${client.name}</a>
      <div class="eyebrow" style="margin:16px 0 0">Dados do cliente</div>
      <div class="row" style="gap:18px;margin-top:12px">
        ${U.avatarHtml(client,'lg')}
        <div class="col">
          <h1 class="display" style="font-size:clamp(26px,4.5vw,40px)">${client.name}</h1>
          <span class="muted">${client.handle}</span>
        </div>
      </div>
    </section>

    <section class="section" style="max-width:760px">
      <div class="card pad">
        <div class="eyebrow" style="margin-bottom:14px">Foto / ícone do cliente</div>
        <div class="row" style="gap:14px;align-items:center">
          <div class="proj-thumb" id="av-preview" style="border-radius:50%"></div>
          <label class="btn btn-sm card" for="av-file" id="av-uplabel" style="cursor:pointer"></label>
          <input type="file" id="av-file" accept="image/*" class="hidden" onchange="avFile(this)">
          <button class="btn btn-sm btn-ghost" onclick="avClear()">Remover</button>
        </div>
      </div>
    </section>

    <section class="section" style="max-width:760px">
      <div class="card pad">
        <div class="eyebrow" style="margin-bottom:14px">Contato & contrato</div>
        <div class="grid c2">
          <div class="field"><label>Telefone / WhatsApp</label><input class="input" id="d-tel" value="${DADOS.telefone||''}" placeholder="55 19 99999-9999"></div>
          <div class="field"><label>E-mail</label><input class="input" id="d-email" value="${(DADOS.email||'').replace(/"/g,'&quot;')}" placeholder="cliente@email.com"></div>
          <div class="field"><label>Serviço / pacote</label><input class="input" id="d-serv" value="${(DADOS.servico||'').replace(/"/g,'&quot;')}" placeholder="Ex.: Pacote Raízes"></div>
          <div class="field"><label>Link do contrato (Drive)</label><input class="input" id="d-contrato" value="${(DADOS.contrato||'').replace(/"/g,'&quot;')}" placeholder="https://..."></div>
        </div>
        <div class="field"><label>Observações</label><textarea class="textarea" id="d-obs" style="min-height:70px" placeholder="Qualquer nota importante do cliente...">${DADOS.obs||''}</textarea></div>
      </div>
    </section>

    <section class="section" style="max-width:760px">
      <div class="card pad">
        <div class="row between" style="margin-bottom:6px">
          <div class="eyebrow" style="margin:0">Acessos das redes</div>
          <button class="btn btn-sm card" onclick="addA()">${U.icon('plus')} Acesso</button>
        </div>
        <p class="hint" style="margin-bottom:12px">⚠️ Guardado do jeito simples. Para senhas com segurança total, a gente sobe o login de verdade depois.</p>
        <div class="col" id="acessos">${ACESSOS.length?ACESSOS.map(acessoRow).join(''):'<p class="meta-sm">Nenhum acesso salvo.</p>'}</div>
      </div>
      <button class="btn btn-primary" style="margin-top:16px" onclick="salvar()">${U.icon('check')} Salvar dados</button>
    </section>`;
  avRefresh();
  document.getElementById("av-uplabel").innerHTML=U.icon("upload")+" Enviar foto";
}

function avRefresh(){ const el=document.getElementById("av-preview"); if(!el) return;
  if(client.avatar){ el.style.cssText='border-radius:50%;background-image:url("'+client.avatar+'");background-size:cover;background-position:center'; el.innerHTML=''; }
  else { el.className='proj-thumb noimg'; el.style.cssText='border-radius:50%'; el.innerHTML=U.icon('user'); } }
async function avFile(input){ const f=input.files[0]; if(!f) return;
  U.toast('Enviando foto...'); const url=await Store.uploadCover(f); input.value='';
  if(url){ await Store.setAvatar(CID,url); avRefresh(); U.toast('Foto salva ✅'); } }
async function avClear(){ await Store.setAvatar(CID,''); avRefresh(); U.toast('Foto removida'); }

function addA(){ ACESSOS.push({rede:'',login:'',senha:''}); renderAcessos(); }
function delA(i){ ACESSOS.splice(i,1); renderAcessos(); }
function edA(i,f,val){ ACESSOS[i][f]=val; }
function renderAcessos(){ document.getElementById("acessos").innerHTML=ACESSOS.length?ACESSOS.map(acessoRow).join(''):'<p class="meta-sm">Nenhum acesso salvo.</p>'; }

async function salvar(){
  DADOS.telefone=v('d-tel').trim(); DADOS.email=v('d-email').trim(); DADOS.servico=v('d-serv').trim();
  DADOS.contrato=v('d-contrato').trim(); DADOS.obs=v('d-obs').trim(); DADOS.acessos=ACESSOS.filter(a=>a.rede||a.login||a.senha);
  await Store.setDados(CID, DADOS); U.toast('Dados salvos ✅');
}

function start(){
  client=Data.client(CID);
  if(!client){ document.getElementById("root").innerHTML='<div class="empty" style="padding-top:60px">Cliente não encontrado. <a href="hub.html">Voltar</a></div>'; return; }
  DADOS=JSON.parse(JSON.stringify(client.dados||{}));
  ACESSOS=(DADOS.acessos||[]).map(a=>Object.assign({},a));
  render();
}
U.boot(start, {manager:true});
</script>
</body>
</html>
