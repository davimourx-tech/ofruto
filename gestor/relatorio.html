<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>oFruto · Relatório mensal</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="hub.html"><span class="dot"></span> oFruto <small>gestor</small></a>
    <nav class="topnav" id="crumbs"></nav>
  </div>
</header>

<main class="wrap pagepad" id="root"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const CID=U.qs("c");
let client, REPORTS=[], CUR=null;
const METRICS=[
  {k:'seguidores_total',l:'Seguidores (total)'},
  {k:'seguidores_ganhos',l:'Seguidores ganhos no mês'},
  {k:'alcance',l:'Alcance'},
  {k:'views',l:'Visualizações'},
  {k:'interacoes',l:'Interações'},
  {k:'salvamentos',l:'Salvamentos'},
  {k:'compartilhamentos',l:'Compartilhamentos'},
  {k:'visitas_perfil',l:'Visitas ao perfil'},
  {k:'posts_publicados',l:'Posts publicados'}
];
const MES=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
function mesLabel(m){ if(!m) return ''; const [y,mm]=m.split('-'); return MES[Number(mm)-1]+' '+y; }
function v(id){ return document.getElementById(id).value; }

function blankReport(month){ return { month, handle: (client.dados&&client.dados.instagram)||client.handle||'', metrics:{}, analysis:'', published:false }; }
function loadMonth(month){ CUR = REPORTS.find(r=>r.month===month) || blankReport(month); render(); }

function render(){
  document.getElementById("crumbs").innerHTML=`<a href="cliente.html?c=${CID}">← ${client.name}</a>`;
  const thisMonth = CUR ? CUR.month : new Date().toISOString().slice(0,7);
  const metricInputs = METRICS.map(m=>`<div class="field"><label>${m.l}</label>
    <input class="input" id="m-${m.k}" type="number" value="${(CUR.metrics[m.k]??'')}" placeholder="0"></div>`).join('');
  document.getElementById("root").innerHTML=`
    <section class="section">
      <a class="meta-sm" href="cliente.html?c=${CID}">← ${client.name}</a>
      <div class="eyebrow" style="margin:16px 0 0">Relatório mensal</div>
      <div class="row between wrap" style="gap:14px;margin-top:8px">
        <div class="row" style="gap:18px">${U.avatarHtml(client,'lg')}
          <div class="col"><h1 class="display" style="font-size:clamp(26px,4.5vw,40px)">${client.name}</h1>
            <span class="muted">${mesLabel(thisMonth)}</span></div></div>
        <label class="col meta-sm" style="gap:4px">Mês do relatório
          <input class="input" type="month" id="r-month" value="${thisMonth}" onchange="loadMonth(this.value)"></label>
      </div>
    </section>

    <section class="section" style="max-width:820px">
      <div class="card pad">
        <div class="eyebrow" style="margin:0 0 12px">Métricas do mês</div>

        <div class="card pad" style="background:var(--surface-2);margin-bottom:16px">
          <div class="row between wrap" style="gap:10px">
            <div class="col" style="gap:2px">
              <strong style="font-size:14px">${U.icon('chart')} Métricas reais — Windsor.ai</strong>
              <span class="meta-sm">Alcance, salvamentos, compartilhamentos, visitas — puxadas da conta conectada.</span>
            </div>
            <div class="row wrap" style="gap:8px">
              <input class="input" id="r-windsor" style="width:auto;min-width:180px" value="${(client.dados&&client.dados.windsor)||''}" placeholder="Conta no Windsor (account_name)">
              <button class="btn btn-sm btn-primary" onclick="puxarWindsor()">${U.icon('download')} Puxar do Windsor</button>
            </div>
          </div>
          <p class="hint" style="margin-top:8px">O nome é como a conta aparece no Windsor. Não sabe? <a style="text-decoration:underline;cursor:pointer" onclick="listarContas()">ver contas conectadas</a>. Puxa o mês selecionado acima.</p>
        </div>

        <div class="grid c3">${metricInputs}</div>

        <div class="row between wrap" style="gap:8px;margin-top:12px">
          <p class="hint" style="margin:0">Complemento público (seguidores / nº de posts) via Instagram:</p>
          <div class="row" style="gap:8px">
            <input class="input" id="r-handle" style="width:auto" value="${CUR.handle||''}" placeholder="@docliente">
            <button class="btn btn-sm card" onclick="puxarIG()">${U.icon('instagram')} Puxar público</button>
          </div>
        </div>
      </div>
    </section>

    <section class="section" style="max-width:820px">
      <div class="card pad">
        <div class="row between" style="margin-bottom:12px">
          <div class="eyebrow" style="margin:0">Análise</div>
          <button class="btn btn-sm btn-primary" id="genBtn" onclick="gerar()">${U.icon('sparkle')} Gerar com IA</button>
        </div>
        <textarea class="textarea" id="r-analysis" style="min-height:220px" placeholder="Escreva ou gere a análise do mês...">${CUR.analysis||''}</textarea>
      </div>
      <div class="row wrap" style="gap:10px;margin-top:16px">
        <button class="btn btn-primary" onclick="salvar(false)">${U.icon('check')} Salvar</button>
        <button class="btn card" onclick="salvar(true)">${U.icon('eye')} ${CUR.published?'Publicado — atualizar':'Salvar e publicar pro cliente'}</button>
        ${REPORTS.find(r=>r.month===CUR.month)?`<button class="btn btn-ghost" style="color:var(--red)" onclick="excluir()">Excluir</button>`:''}
      </div>
    </section>

    ${REPORTS.length?`<section class="section" style="max-width:820px">
      <h2 class="display" style="font-size:20px;margin-bottom:12px">Relatórios salvos</h2>
      <div class="col" style="gap:8px">${REPORTS.slice().sort((a,b)=>b.month.localeCompare(a.month)).map(r=>`
        <a class="card pad row between hover" onclick="loadMonth('${r.month}');return false" href="#">
          <strong>${mesLabel(r.month)}</strong>
          <span class="badge ${r.published?'is-aprovado':''}">${r.published?'Publicado':'Rascunho'}</span></a>`).join('')}</div>
    </section>`:''}`;
}

function collectMetrics(){ const m={}; METRICS.forEach(x=>{ const val=v('m-'+x.k); if(val!=='') m[x.k]=Number(val); }); return m; }

/* intervalo do mês selecionado (YYYY-MM -> primeiro e último dia) */
function monthRange(month){
  const [y,m]=month.split('-').map(Number);
  const from=`${y}-${String(m).padStart(2,'0')}-01`;
  const last=new Date(y, m, 0).getDate();
  const to=`${y}-${String(m).padStart(2,'0')}-${String(last).padStart(2,'0')}`;
  return { from, to };
}
async function puxarWindsor(){
  const account=v('r-windsor').trim();
  if(!account){ U.toast('Informe a conta no Windsor'); return; }
  // salva o nome da conta no cliente (pra não digitar de novo)
  const dados=Object.assign({}, client.dados||{}, { windsor:account });
  await Store.setDados(CID, dados); client.dados=dados;
  const { from, to }=monthRange(CUR.month);
  U.toast('Puxando do Windsor...');
  try{
    const d=await Store.fetchWindsor({ account, date_from:from, date_to:to });
    const m=d.metrics||{}; let n=0;
    METRICS.forEach(x=>{ if(m[x.k]!=null){ const el=document.getElementById('m-'+x.k); if(el){ el.value=m[x.k]; n++; } } });
    U.toast(n?`Preenchi ${n} métrica(s) reais ✅ (${d.rows} dias)`:'Conectou, mas não achei métricas — confira os campos');
  }catch(e){ alert('Não deu pra puxar do Windsor:\n\n'+e.message); }
}
async function listarContas(){
  U.toast('Buscando contas conectadas...');
  try{
    const d=await Store.windsorAccounts();
    const list=(d.accounts||[]).map(a=>a.username||a.raw||a.account_id).filter(Boolean);
    if(!list.length){ alert('Nenhuma conta conectada ainda. Conecte o Instagram do cliente no Windsor primeiro.'); return; }
    const pick=prompt('Contas conectadas no Windsor:\n\n'+list.map((n,i)=>`${i+1}. ${n}`).join('\n')+'\n\nCopie o nome exato pro campo, ou digite o número:');
    if(pick===null) return;
    const idx=Number(pick)-1;
    document.getElementById('r-windsor').value = (idx>=0 && list[idx]) ? list[idx] : pick.trim();
  }catch(e){ alert('Não deu pra listar: '+e.message); }
}
async function puxarIG(){
  const h=v('r-handle').trim(); if(!h){ U.toast('Informe o @'); return; }
  U.toast('Puxando do Instagram...');
  try{ const d=await Store.fetchInstagram(h);
    if(d.seguidores!=null) document.getElementById('m-seguidores_total').value=d.seguidores;
    if(d.posts!=null) document.getElementById('m-posts_publicados').value=d.posts;
    U.toast('Dados públicos preenchidos ✅');
  }catch(e){ alert('Não deu pra puxar: '+e.message); }
}
async function gerar(){
  const metrics=collectMetrics();
  if(!Object.keys(metrics).length){ U.toast('Preencha as métricas primeiro'); return; }
  const btn=document.getElementById('genBtn'); btn.disabled=true; const old=btn.innerHTML; btn.innerHTML=U.icon('sparkle')+' Gerando...';
  try{ const analysis=await Store.generateReport(CID, CUR.month, v('r-handle').trim(), metrics);
    document.getElementById('r-analysis').value=analysis; U.toast('Análise gerada ✨');
  }catch(e){ alert('Não deu pra gerar: '+e.message); }
  btn.disabled=false; btn.innerHTML=old;
}
async function salvar(publish){
  CUR.handle=v('r-handle').trim(); CUR.metrics=collectMetrics(); CUR.analysis=v('r-analysis').trim();
  if(publish) CUR.published=true;
  const i=REPORTS.findIndex(r=>r.month===CUR.month);
  if(i>=0) REPORTS[i]=CUR; else REPORTS.push(CUR);
  await Store.setReports(CID, REPORTS); U.toast(publish?'Publicado pro cliente ✅':'Salvo'); render();
}
async function excluir(){ if(!confirm('Excluir este relatório?')) return;
  REPORTS=REPORTS.filter(r=>r.month!==CUR.month); await Store.setReports(CID,REPORTS);
  CUR=blankReport(new Date().toISOString().slice(0,7)); U.toast('Excluído'); render(); }

function start(){
  client=Data.client(CID);
  if(!client){ document.getElementById("root").innerHTML='<div class="empty" style="padding-top:60px">Cliente não encontrado.</div>'; return; }
  REPORTS=JSON.parse(JSON.stringify(client.reports||[]));
  CUR=blankReport(new Date().toISOString().slice(0,7));
  const ex=REPORTS.find(r=>r.month===CUR.month); if(ex) CUR=ex;
  render();
}
U.boot(start, {manager:true});
</script>
</body>
</html>
