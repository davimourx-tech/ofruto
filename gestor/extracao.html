<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>oFruto · Extração</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="hub.html"><span class="dot"></span> oFruto <small>gestor</small></a>
    <nav class="topnav" id="crumbs"></nav>
  </div>
</header>

<main class="wrap pagepad" id="root"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const CID=U.qs("c");
let client;
const TPL = (window.APP_CONFIG && APP_CONFIG.DEFAULT_EXTRACTION) || [];

function ans(qid){ return (client.extraction||{})[qid]; }

function fieldFor(q){
  const v = ans(q.id);
  if(q.type==="choice"){
    const sel = Array.isArray(v)? v : (v?[v]:[]);
    const chips = q.options.map(o=>`<button type="button" class="chip ${sel.includes(o)?'on':''}" onclick="toggleChoice('${q.id}','${o.replace(/'/g,"\\'")}')">${o}</button>`).join('');
    return `<div class="chips" id="f-${q.id}">${chips}</div>`;
  }
  if(q.type==="url"){
    return `<input class="input" type="url" id="f-${q.id}" value="${(v||'').replace(/"/g,'&quot;')}" placeholder="https://..." onchange="saveField('${q.id}',this.value)">`;
  }
  return `<textarea class="textarea" id="f-${q.id}" style="min-height:70px" placeholder="Anote aqui a resposta..." onchange="saveField('${q.id}',this.value)">${v||''}</textarea>`;
}

function progress(){
  let total=0, done=0;
  TPL.forEach(b=>b.questions.forEach(q=>{ total++; const v=ans(q.id); if(Array.isArray(v)?v.length:(v&&String(v).trim())) done++; }));
  return {total,done,pct: total?Math.round(done/total*100):0};
}

function render(){
  const pr=progress();
  document.getElementById("crumbs").innerHTML=`<a href="cliente.html?c=${CID}">← ${client.name}</a>`;
  document.getElementById("root").innerHTML=`
    <section class="section">
      <a class="meta-sm" href="cliente.html?c=${CID}">← ${client.name}</a>
      <div class="eyebrow" style="margin:16px 0 0">Extração · base estratégica</div>
      <h1 class="display" style="font-size:clamp(28px,5vw,44px);margin-top:8px">${client.name}</h1>
      <p class="lead" style="margin-top:12px">Preencha durante a reunião de extração. Salva sozinho a cada campo. Só você vê isto.</p>
      <div class="row" style="gap:14px;margin-top:16px;max-width:420px">
        <div class="bar grow"><i style="width:${pr.pct}%"></i></div>
        <span class="meta-sm nowrap">${pr.done}/${pr.total}</span>
        <span class="saveflag" id="saveflag">salvo ✓</span>
      </div>
    </section>

    <section class="section" style="max-width:760px">
      ${TPL.map(blockHtml).join('')}
    </section>`;
}

function blockHtml(b){
  return `<div class="xblock card pad">
    <h3>${b.title}</h3>
    ${b.questions.map(q=>`<div class="xq"><label>${q.q}</label>${fieldFor(q)}</div>`).join('')}
  </div>`;
}

async function saveField(qid,val){
  await Store.setExtraction(CID,qid,(val||'').trim());
  flashSaved(); updateProgress();
}
async function toggleChoice(qid,opt){
  const cur = Array.isArray(ans(qid))? ans(qid).slice() : (ans(qid)?[ans(qid)]:[]);
  const i=cur.indexOf(opt); if(i>=0) cur.splice(i,1); else cur.push(opt);
  await Store.setExtraction(CID,qid,cur);
  // re-render só os chips do campo
  const q = TPL.flatMap(b=>b.questions).find(x=>x.id===qid);
  document.getElementById("f-"+qid).outerHTML = fieldFor(q);
  flashSaved(); updateProgress();
}
function updateProgress(){
  const pr=progress();
  const bar=document.querySelector(".bar > i"); if(bar) bar.style.width=pr.pct+"%";
  const lbl=document.querySelector(".saveflag"); // keep
  const cnt=document.querySelector(".row .meta-sm.nowrap"); if(cnt) cnt.textContent=`${pr.done}/${pr.total}`;
}
let _sf;
function flashSaved(){ const el=document.getElementById("saveflag"); if(!el) return;
  el.classList.add("show"); clearTimeout(_sf); _sf=setTimeout(()=>el.classList.remove("show"),1400); }

function start(){
  client=Data.client(CID);
  if(!client){ document.getElementById("root").innerHTML='<div class="empty" style="padding-top:60px">Cliente não encontrado. <a href="hub.html">Voltar</a></div>'; return; }
  render();
}
U.boot(start, {manager:true});
</script>
</body>
</html>
