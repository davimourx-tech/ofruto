<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>oFruto · Projeto</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="hub.html"><span class="dot"></span> oFruto <small>gestor</small></a>
    <nav class="topnav" id="crumbs"></nav>
  </div>
</header>

<main class="wrap pagepad" id="root"></main>

<!-- Modal editar/criar post -->
<div class="scrim" id="scrim" onclick="closeModals(event)"></div>
<div class="modal" id="postModal">
  <div class="head"><strong id="pm-title">Editar post</strong><button class="btn-icon" id="x1" onclick="closeModals()"></button></div>
  <div class="body">
    <div class="field"><label>Título interno</label>
      <input class="input" id="f-title" placeholder="Ex.: Reel manifesto"></div>
    <div class="row" style="gap:12px">
      <div class="field grow"><label>Formato</label>
        <select class="input" id="f-type">
          <option value="reel-9-16">Reel 9:16 (vertical)</option>
          <option value="reel-16-9">Vídeo 16:9 (horizontal)</option>
          <option value="foto">Foto retrato</option>
          <option value="carrossel">Carrossel</option>
        </select></div>
      <div class="field grow"><label>Data de publicação</label>
        <input class="input" id="f-date" type="date"></div>
    </div>
    <div id="grp-content">
      <div class="field"><label>Link do vídeo / mídia</label>
        <input class="input" id="f-embed" placeholder="Link do Google Drive, YouTube ou um .mp4 direto">
        <span class="hint">Drive/YouTube tocam como embed. Um link direto de vídeo (.mp4) toca no player limpo. Vazio = arte de exemplo.</span></div>
      <div class="field"><label>Legenda do post</label>
        <textarea class="textarea" id="f-caption" placeholder="Escreva a legenda que vai no Instagram..."></textarea></div>
      <div class="field"><label>Capa do post (opcional)</label>
        <div class="row" style="gap:12px;align-items:center">
          <div class="proj-thumb noimg" id="pc-preview"></div>
          <label class="btn btn-sm card" for="pc-file" id="pc-uplabel" style="cursor:pointer"></label>
          <input type="file" id="pc-file" accept="image/*" class="hidden" onchange="pcFile(this)">
          <button type="button" class="btn btn-sm btn-ghost" onclick="pcClear()">Sem capa</button>
        </div>
        <input class="input" id="f-pcurl" style="margin-top:8px" placeholder="ou cole o link de uma imagem" oninput="pcUrl(this.value)">
        <span class="hint">Vazio = sem capa. Só adicione se quiser uma miniatura para este post.</span></div>
    </div>
    <div id="grp-plan" class="hidden">
      <div class="field"><label>Briefing</label>
        <textarea class="textarea" id="f-briefing" style="min-height:80px" placeholder="Objetivo da pauta, ideia central, gancho, CTA..."></textarea></div>
      <div class="field"><label>Roteiro / descrição de cenas</label>
        <textarea class="textarea" id="f-roteiro" placeholder="Se for vídeo, descreva as cenas; se for carrossel, o que vai em cada slide."></textarea></div>
      <div class="field"><label>Referências</label>
        <textarea class="textarea" id="f-refs" style="min-height:70px" placeholder="Um link por linha (Instagram, TikTok, Pinterest)"></textarea>
        <span class="hint">O cliente vê como cards clicáveis com o ícone da plataforma.</span></div>
    </div>
    <div class="field"><label>Observação para o cliente (opcional)</label>
      <textarea class="textarea" id="f-note" style="min-height:70px" placeholder="Se vazio, não aparece para o cliente."></textarea></div>
    <div class="field"><label>Status</label>
      <select class="input" id="f-status">
        <option value="pendente">Aguardando aprovação</option>
        <option value="aprovado">Aprovado</option>
        <option value="ajustes">Em ajustes</option>
        <option value="reprovado">Reprovado</option>
      </select></div>
  </div>
  <div class="foot">
    <button class="btn btn-ghost" id="delBtn" onclick="deletePost()" style="margin-right:auto;color:var(--red)">Excluir</button>
    <button class="btn btn-ghost" onclick="closeModals()">Cancelar</button>
    <button class="btn btn-primary" onclick="savePost()">Salvar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const CID=U.qs("c"), PID=U.qs("p");
let client, project;
document.getElementById("x1").innerHTML=U.icon("x");
document.getElementById("pc-uplabel").innerHTML=U.icon("upload")+" Enviar capa";
let EDITING=null, PC_COVER='';

function pcRefresh(){ const el=document.getElementById("pc-preview");
  if(PC_COVER){ const cv=U.coverAttrs(PC_COVER); el.className='proj-thumb '+cv.cls; el.style.cssText=cv.style; el.innerHTML=''; }
  else { el.className='proj-thumb noimg'; el.style.cssText=''; el.innerHTML=U.icon('image'); } }
function pcUrl(v){ PC_COVER=(v||'').trim(); pcRefresh(); }
function pcClear(){ PC_COVER=''; document.getElementById("f-pcurl").value=''; pcRefresh(); }
async function pcFile(input){ const f=input.files[0]; if(!f) return;
  U.toast('Enviando capa...'); const url=await Store.uploadCover(f); input.value='';
  if(url){ PC_COVER=url; document.getElementById("f-pcurl").value=url; pcRefresh(); U.toast('Capa enviada ✅'); } }

function isPlan(){ return project.kind==='planejamento'; }

function postRow(post){
  const st=STATUS.post[post.status], t=TYPE[post.type];
  const plan=isPlan();
  const hasReq = post.request? `<div class="note-box" style="margin-top:12px"><strong>Solicitação do cliente — ${post.request.scope}:</strong><br>${post.request.text}</div>`:'';
  const hasPalpite = post.palpite? `<div class="note-box" style="margin-top:10px;background:var(--blue-soft);border-color:rgba(75,155,255,.3);color:#bcd9ff"><strong>${U.icon('chat')} Palpite do cliente:</strong><br>${post.palpite}</div>`:'';
  const refsN = plan? U.refList(post.refs).length : 0;
  const summaryText = plan ? (post.briefing||'Sem briefing') : (post.caption||'');
  const metaLine = plan
    ? `${t.label}${refsN?` · ${refsN} ref.`:''}${post.date?` · ${U.fmtDate(post.date)}`:''}`
    : `${t.label} · publica ${U.fmtDate(post.date)}`;
  return `
  <div class="card pad hover">
    <div class="row between wrap" style="gap:16px">
      <div class="row" style="gap:14px;min-width:230px">
        ${post.cover
          ? `<div class="${U.coverAttrs(post.cover).cls}" style="width:64px;height:64px;border-radius:14px;flex:none;${U.coverAttrs(post.cover).style}"></div>`
          : `<div class="noimg" style="width:64px;height:64px;border-radius:14px;flex:none">${U.icon(t.icon)}</div>`}
        <div class="col">
          <strong>${post.title}</strong>
          <span class="meta-sm">${metaLine}</span>
          <div style="margin-top:8px"><span class="badge ${st.cls}"><span class="pip"></span>${st.label}</span></div>
        </div>
      </div>
      <p class="muted grow" style="min-width:180px;max-width:420px;font-size:13.5px">${summaryText.slice(0,120)}${summaryText.length>120?'…':''}</p>
      <button class="btn btn-sm card nowrap" onclick="edit('${post.id}')">${U.icon("edit")} Editar</button>
    </div>
    ${hasReq}${hasPalpite}
  </div>`;
}

function render(){
  const st=STATUS.project[project.status];
  const pr=Data.projectProgress(project);
  const plan=isPlan();
  const unit=plan?'pautas':'posts';
  document.getElementById("root").innerHTML=`
    <section class="section">
      <a class="meta-sm" href="cliente.html?c=${CID}">← ${client.name}</a>
      <div class="row between wrap" style="gap:16px;margin-top:12px">
        <div>
          <div class="row wrap" style="gap:10px;margin-bottom:10px">
            <span class="badge ${st.cls} ${st.live?'live':''}"><span class="pip"></span>${st.label}</span>
            ${plan?`<span class="badge">${U.icon('idea')} Planejamento</span>`:''}
          </div>
          <div class="row" style="gap:10px;align-items:center">
            <h1 class="display" style="font-size:clamp(28px,5vw,46px)">${project.name}</h1>
            <button class="btn-icon card" title="Renomear projeto" onclick="renameProject()">${U.icon('edit')}</button>
          </div>
          <p class="muted" style="margin-top:8px">${pr.total} ${unit} · ${pr.ok} aprovadas · ${pr.pct}% concluído · <a class="meta-sm" style="text-decoration:underline;cursor:pointer" onclick="editIntro()">editar mensagem de abertura</a></p>
        </div>
        <div class="row wrap" style="gap:10px">
          <label class="meta-sm" style="display:flex;flex-direction:column;gap:4px">Prazo de aprovação
            <input class="input" type="date" id="projDeadline" value="${project.deadline||''}" onchange="changeDeadline(this.value)" style="width:auto"></label>
          <select class="input select-bare" style="width:auto" id="projStatus" onchange="changeProjStatus(this.value)">
            <option value="breve"${project.status==='breve'?' selected':''}>Em breve</option>
            <option value="andamento"${project.status==='andamento'?' selected':''}>Em andamento</option>
            <option value="pronto"${project.status==='pronto'?' selected':''}>Pronto p/ visualizar</option>
          </select>
          <button class="btn btn-primary" onclick="newPost()">${U.icon("plus")} ${plan?'Nova pauta':'Novo post'}</button>
        </div>
      </div>
      <div class="bar" style="margin-top:18px"><i style="width:${pr.pct}%"></i></div>
    </section>

    <section class="section">
      <div class="col stagger" style="gap:12px">
        ${project.posts.map(postRow).join("") || '<div class="empty card pad">Nenhum post. Clique em “Novo post”.</div>'}
      </div>
    </section>`;
  U.reveal();
}

/* edit/create */
function toggleGroups(){
  const plan=isPlan();
  document.getElementById("grp-content").classList.toggle("hidden", plan);
  document.getElementById("grp-plan").classList.toggle("hidden", !plan);
}
function edit(id){
  EDITING=id; const p=Data.post(CID,PID,id);
  document.getElementById("pm-title").textContent=isPlan()?"Editar pauta":"Editar post";
  document.getElementById("delBtn").style.display="";
  toggleGroups(); fill(p); openModal("postModal");
}
function newPost(){
  EDITING=null;
  document.getElementById("pm-title").textContent=isPlan()?"Nova pauta":"Novo post";
  document.getElementById("delBtn").style.display="none";
  toggleGroups();
  fill({title:"",type:"reel-9-16",date:"",embed:"",caption:"",note:"",status:"pendente",briefing:"",roteiro:"",refs:""});
  openModal("postModal");
}
function fill(p){
  f("title",p.title); f("type",p.type); f("date",p.date); f("embed",p.embed||"");
  f("caption",p.caption||""); f("note",p.note||""); f("status",p.status);
  f("briefing",p.briefing||""); f("roteiro",p.roteiro||""); f("refs",p.refs||"");
  PC_COVER=p.cover||""; f("pcurl",PC_COVER); pcRefresh();
}
function f(id,val){document.getElementById("f-"+id).value=val;}
function g(id){return document.getElementById("f-"+id).value;}

async function savePost(){
  const data={ title:g("title")||"Sem título", type:g("type"), date:g("date"),
    embed:g("embed").trim(), caption:g("caption").trim(), note:g("note").trim(), status:g("status"),
    briefing:g("briefing").trim(), roteiro:g("roteiro").trim(), refs:g("refs").trim(), cover:PC_COVER };
  const wasEditing=!!EDITING;
  await Store.savePost(CID,PID,data,EDITING);
  U.toast(wasEditing?"Salvo":"Criado");
  closeModals(); render();
}
async function changeDeadline(v){ await Store.setProjectDeadline(CID,PID,v); U.toast("Prazo atualizado"); }
async function renameProject(){
  const n=prompt("Novo nome do projeto:", project.name);
  if(n===null) return;
  const name=n.trim(); if(!name){ U.toast("Nome não pode ficar vazio"); return; }
  await Store.setProjectName(CID,PID,name); U.toast("Projeto renomeado"); render();
}
async function editIntro(){
  const n=prompt("Mensagem de abertura (o cliente vê no topo do projeto):", project.intro||"");
  if(n===null) return;
  await Store.setProjectIntro(CID,PID,n.trim()); U.toast("Mensagem atualizada"); render();
}
async function deletePost(){
  if(!EDITING) return;
  if(!confirm("Excluir este post?")) return;
  await Store.deletePost(CID,PID,EDITING);
  closeModals(); U.toast("Post excluído"); render();
}
async function changeProjStatus(v){ await Store.setProjectStatus(CID,PID,v); U.toast("Status do projeto atualizado"); render(); }

function openModal(id){document.getElementById("scrim").classList.add("open");document.getElementById(id).classList.add("open");}
function closeModals(e){if(e&&e.target.closest(".modal"))return;
  document.querySelectorAll(".modal").forEach(m=>m.classList.remove("open"));
  document.getElementById("scrim").classList.remove("open");}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModals();});

async function start(){
  client=Data.client(CID); project=Data.project(CID,PID);
  document.getElementById("crumbs").innerHTML=`<a href="cliente.html?c=${CID}">← ${client?client.name:'Cliente'}</a>`;
  if(!project){document.getElementById("root").innerHTML='<div class="empty" style="padding-top:60px">Projeto não encontrado. <a href="hub.html">Voltar</a></div>';return;}
  await Store.applyDeadline(project);
  render();
}
U.boot(start, {manager:true});
</script>
</body>
</html>
