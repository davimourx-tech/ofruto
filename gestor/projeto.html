<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>oFruto · Projeto</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="hub.html"><span class="dot"></span> oFruto <small>gestor</small></a>
    <nav class="topnav" id="crumbs"></nav>
  </div>
</header>

<main class="wrap pagepad" id="root"></main>

<!-- Modal editar/criar post -->
<div class="scrim" id="scrim" onclick="closeModals(event)"></div>
<div class="modal" id="postModal">
  <div class="head"><strong id="pm-title">Editar post</strong><button class="btn-icon" id="x1" onclick="closeModals()"></button></div>
  <div class="body">
    <div class="field"><label>Título interno</label>
      <input class="input" id="f-title" placeholder="Ex.: Reel manifesto"></div>
    <div class="row" style="gap:12px">
      <div class="field grow"><label>Formato</label>
        <select class="input" id="f-type">
          <option value="reel-9-16">Reel 9:16 (vertical)</option>
          <option value="reel-16-9">Vídeo 16:9 (horizontal)</option>
          <option value="foto">Foto retrato</option>
          <option value="carrossel">Carrossel</option>
        </select></div>
      <div class="field grow"><label>Data de publicação</label>
        <input class="input" id="f-date" type="date"></div>
    </div>
    <div class="field"><label>Link embed do Drive (vídeo/foto/carrossel)</label>
      <input class="input" id="f-embed" placeholder="https://drive.google.com/file/d/.../preview">
      <span class="hint">Etapa 2: cole aqui o link de pré-visualização do Drive. Vazio = usa a arte de exemplo.</span></div>
    <div class="field"><label>Legenda do post</label>
      <textarea class="textarea" id="f-caption" placeholder="Escreva a legenda que vai no Instagram..."></textarea></div>
    <div class="field"><label>Observação para o cliente (opcional)</label>
      <textarea class="textarea" id="f-note" style="min-height:70px" placeholder="Se vazio, não aparece para o cliente."></textarea></div>
    <div class="field"><label>Status</label>
      <select class="input" id="f-status">
        <option value="pendente">Aguardando aprovação</option>
        <option value="aprovado">Aprovado</option>
        <option value="ajustes">Em ajustes</option>
        <option value="reprovado">Reprovado</option>
      </select></div>
  </div>
  <div class="foot">
    <button class="btn btn-ghost" id="delBtn" onclick="deletePost()" style="margin-right:auto;color:var(--red)">Excluir</button>
    <button class="btn btn-ghost" onclick="closeModals()">Cancelar</button>
    <button class="btn btn-primary" onclick="savePost()">Salvar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const CID=U.qs("c"), PID=U.qs("p");
let client, project;
document.getElementById("x1").innerHTML=U.icon("x");
let EDITING=null;

function postRow(post){
  const st=STATUS.post[post.status], t=TYPE[post.type];
  const hasReq = post.request? `<div class="note-box" style="margin-top:12px"><strong>Solicitação do cliente — ${post.request.scope}:</strong><br>${post.request.text}</div>`:'';
  return `
  <div class="card pad hover">
    <div class="row between wrap" style="gap:16px">
      <div class="row" style="gap:14px;min-width:230px">
        <div class="cover grad ${post.art} ${t.ratio}" style="width:64px;border-radius:14px;flex:none"><div class="art-noise"></div></div>
        <div class="col">
          <strong>${post.title}</strong>
          <span class="meta-sm">${t.label} · publica ${U.fmtDate(post.date)}</span>
          <div style="margin-top:8px"><span class="badge ${st.cls}"><span class="pip"></span>${st.label}</span></div>
        </div>
      </div>
      <p class="muted grow" style="min-width:180px;max-width:420px;font-size:13.5px">${(post.caption||'').slice(0,120)}${(post.caption||'').length>120?'…':''}</p>
      <button class="btn btn-sm card nowrap" onclick="edit('${post.id}')">${U.icon("edit")} Editar</button>
    </div>
    ${hasReq}
  </div>`;
}

function render(){
  const st=STATUS.project[project.status];
  const pr=Data.projectProgress(project);
  document.getElementById("root").innerHTML=`
    <section class="section">
      <a class="meta-sm" href="cliente.html?c=${CID}">← ${client.name}</a>
      <div class="row between wrap" style="gap:16px;margin-top:12px">
        <div>
          <div class="row" style="gap:10px;margin-bottom:10px">
            <span class="badge ${st.cls} ${st.live?'live':''}"><span class="pip"></span>${st.label}</span>
          </div>
          <h1 class="display" style="font-size:clamp(28px,5vw,46px)">${project.name}</h1>
          <p class="muted" style="margin-top:8px">${pr.total} posts · ${pr.ok} aprovados · ${pr.pct}% concluído</p>
        </div>
        <div class="row" style="gap:10px">
          <select class="input select-bare" style="width:auto" id="projStatus" onchange="changeProjStatus(this.value)">
            <option value="breve"${project.status==='breve'?' selected':''}>Em breve</option>
            <option value="andamento"${project.status==='andamento'?' selected':''}>Em andamento</option>
            <option value="pronto"${project.status==='pronto'?' selected':''}>Pronto p/ visualizar</option>
          </select>
          <button class="btn btn-primary" onclick="newPost()">${U.icon("plus")} Novo post</button>
        </div>
      </div>
      <div class="bar" style="margin-top:18px"><i style="width:${pr.pct}%"></i></div>
    </section>

    <section class="section">
      <div class="col stagger" style="gap:12px">
        ${project.posts.map(postRow).join("") || '<div class="empty card pad">Nenhum post. Clique em “Novo post”.</div>'}
      </div>
    </section>`;
  U.reveal();
}

/* edit/create */
function edit(id){
  EDITING=id; const p=Data.post(CID,PID,id);
  document.getElementById("pm-title").textContent="Editar post";
  document.getElementById("delBtn").style.display="";
  fill(p); openModal("postModal");
}
function newPost(){
  EDITING=null;
  document.getElementById("pm-title").textContent="Novo post";
  document.getElementById("delBtn").style.display="none";
  fill({title:"",type:"reel-9-16",date:"",embed:"",caption:"",note:"",status:"pendente"});
  openModal("postModal");
}
function fill(p){
  f("title",p.title); f("type",p.type); f("date",p.date); f("embed",p.embed||"");
  f("caption",p.caption||""); f("note",p.note||""); f("status",p.status);
}
function f(id,val){document.getElementById("f-"+id).value=val;}
function g(id){return document.getElementById("f-"+id).value;}

async function savePost(){
  const data={ title:g("title")||"Sem título", type:g("type"), date:g("date"),
    embed:g("embed").trim(), caption:g("caption").trim(), note:g("note").trim(), status:g("status") };
  const wasEditing=!!EDITING;
  await Store.savePost(CID,PID,data,EDITING);
  U.toast(wasEditing?"Post atualizado":"Post criado");
  closeModals(); render();
}
async function deletePost(){
  if(!EDITING) return;
  if(!confirm("Excluir este post?")) return;
  await Store.deletePost(CID,PID,EDITING);
  closeModals(); U.toast("Post excluído"); render();
}
async function changeProjStatus(v){ await Store.setProjectStatus(CID,PID,v); U.toast("Status do projeto atualizado"); render(); }

function openModal(id){document.getElementById("scrim").classList.add("open");document.getElementById(id).classList.add("open");}
function closeModals(e){if(e&&e.target.closest(".modal"))return;
  document.querySelectorAll(".modal").forEach(m=>m.classList.remove("open"));
  document.getElementById("scrim").classList.remove("open");}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModals();});

function start(){
  client=Data.client(CID); project=Data.project(CID,PID);
  document.getElementById("crumbs").innerHTML=`<a href="cliente.html?c=${CID}">← ${client?client.name:'Cliente'}</a>`;
  if(!project){document.getElementById("root").innerHTML='<div class="empty" style="padding-top:60px">Projeto não encontrado. <a href="hub.html">Voltar</a></div>';return;}
  render();
}
U.boot(start, {manager:true});
</script>
</body>
</html>
