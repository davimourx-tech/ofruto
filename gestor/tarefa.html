<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>oFruto · Tarefa</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" id="homeLink"><span class="dot"></span> oFruto <small>equipe</small></a>
    <nav class="topnav" id="crumbs"></nav>
  </div>
</header>

<main class="wrap pagepad" id="root"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const CID=U.qs("c"), PID=U.qs("p"), POID=U.qs("post");
const CS=(window.APP_CONFIG&&APP_CONFIG.CONTENT_STATUS)||["Em processo","Pronto"];
let client, project, post;

function refCards(refs){
  const list=U.refList(refs);
  if(!list.length) return '<span class="dim">Sem referências.</span>';
  return `<div class="col" style="gap:10px">`+list.map(r=>`
    <a class="card pad row between hover" href="${r.url}" target="_blank" rel="noopener" style="text-decoration:none">
      <div class="row" style="gap:12px;min-width:0">
        <span class="avatar" style="width:40px;height:40px;border-radius:12px;background:var(--surface-3)">${U.icon(r.plat)}</span>
        <div class="col" style="min-width:0"><strong style="font-size:14px">${r.label}</strong>
          <span class="meta-sm" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60vw">${r.url}</span></div>
      </div>${U.icon('arrow')}</a>`).join('')+`</div>`;
}

function render(){
  const tp=TYPE[post.type]||{label:'',icon:'film'};
  const plan=project.kind==='planejamento';
  const prazo=(project.prazo_inicio||project.prazo_fim)
    ? `${project.prazo_inicio?U.fmtDate(project.prazo_inicio):'—'} → ${project.prazo_fim?U.fmtDate(project.prazo_fim):'—'}` : '—';
  const statusSel='<option value="">— status —</option>'+CS.map(s=>`<option ${post.prod===s?'selected':''}>${s}</option>`).join('');
  document.getElementById("crumbs").innerHTML=`<a href="minhas-tarefas.html">← Minhas tarefas</a>`;
  document.getElementById("root").innerHTML=`
    <section class="section" style="max-width:820px">
      <a class="meta-sm" href="minhas-tarefas.html">← Minhas tarefas</a>
      <div class="row wrap" style="gap:8px;margin:14px 0 8px">
        <span class="badge">${U.icon(tp.icon)} ${tp.label}</span>
        ${project.etapa?`<span class="badge">${project.etapa}</span>`:''}
        ${plan?`<span class="badge">${U.icon('idea')} Planejamento</span>`:''}
      </div>
      <h1 class="display" style="font-size:clamp(24px,4vw,34px)">${post.title}</h1>
      <p class="muted" style="margin-top:6px">${client.name} · ${project.name}</p>
    </section>

    <section class="section" style="max-width:820px">
      <div class="card pad">
        <div class="kv"><span class="k">${U.icon('user')} Responsável atual</span><strong>${post.responsavel||'—'}</strong></div>
        <div class="kv"><span class="k">${U.icon('calendar')} Prazo do projeto</span><strong>${prazo}</strong></div>
        ${post.date?`<div class="kv"><span class="k">${U.icon('clock')} Publicação prevista</span><strong>${U.fmtDate(post.date)}</strong></div>`:''}
        ${post.pilar?`<div class="kv"><span class="k">${U.icon('grid')} Pilar</span><strong>${post.pilar}</strong></div>`:''}
      </div>
    </section>

    ${plan?`
    <section class="section" style="max-width:820px">
      <div class="card pad"><div class="eyebrow" style="margin-bottom:10px">Briefing</div>
        <div class="caption-box">${post.briefing||'<span class="dim">Sem briefing.</span>'}</div></div>
    </section>
    ${post.roteiro?`<section class="section" style="max-width:820px"><div class="card pad">
        <div class="eyebrow" style="margin-bottom:10px">Roteiro / cenas</div><div class="caption-box">${post.roteiro}</div></div></section>`:''}
    <section class="section" style="max-width:820px"><div class="card pad">
        <div class="eyebrow" style="margin-bottom:12px">Referências</div>${refCards(post.refs)}</div></section>
    ` : `
    ${post.note?`<section class="section" style="max-width:820px"><div class="note-box">${U.icon('message')} <strong>Observação:</strong><br>${post.note}</div></section>`:''}
    ${post.caption?`<section class="section" style="max-width:820px"><div class="card pad">
        <div class="eyebrow" style="margin-bottom:10px">Legenda</div><div class="caption-box">${post.caption}</div></div></section>`:''}
    ${post.embed?`<section class="section" style="max-width:820px">
        <a class="btn card btn-block" href="${post.embed}" target="_blank" rel="noopener">${U.icon('arrow')} Abrir mídia / referência</a></section>`:''}
    `}

    <section class="section" style="max-width:820px">
      <div class="card pad" style="background:var(--surface-2)">
        <div class="eyebrow" style="margin-bottom:12px">Sua parte</div>
        <div class="row between wrap" style="gap:12px">
          <label class="col meta-sm" style="gap:6px">Status do conteúdo
            <select class="input select-bare" style="width:auto" onchange="setStatus(this.value)">${statusSel}</select></label>
          <button class="btn btn-primary" onclick="concluir()">${U.icon('check')} Concluí minha parte</button>
        </div>
        <p class="hint" style="margin-top:10px">Ao concluir, o conteúdo sai das suas tarefas e volta pro gestor repassar pro próximo responsável.</p>
      </div>
    </section>`;
  U.reveal();
}

async function setStatus(val){ post.prod=val; await Store.setPostMeta(CID,PID,POID,{prod:val}); U.toast('Status atualizado'); }
async function concluir(){
  if(!confirm('Concluir sua parte deste conteúdo?')) return;
  await Store.concludePart(CID,PID,POID); U.toast('Parte concluída ✅');
  location.href='minhas-tarefas.html';
}

function start(){
  document.getElementById("homeLink").href=U.homeHref();
  client=Data.client(CID); project=client?Data.project(CID,PID):null; post=project?Data.post(CID,PID,POID):null;
  if(!post){ document.getElementById("root").innerHTML='<div class="empty" style="padding-top:60px">Conteúdo não encontrado. <a href="minhas-tarefas.html">Voltar</a></div>'; return; }
  render();
}
U.boot(start, {op:true});
</script>
</body>
</html>
