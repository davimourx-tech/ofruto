<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>oFruto · Operacional</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" id="homeLink"><span class="dot"></span> oFruto <small id="rolelbl">equipe</small></a>
    <nav class="topnav"><a id="homeNav">← Início</a><a href="#" onclick="Auth.logout();return false">Sair</a></nav>
  </div>
</header>

<main class="wrap pagepad" id="root"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const DONE=["Pronto","Postado"];
function summary(c){ let total=0,done=0;
  c.projects.forEach(p=>{ if(p.kind==='entrega') return; p.posts.forEach(x=>{ total++; if(DONE.includes(x.prod)) done++; }); });
  return {total, done, prod:total-done}; }

let GESTOR=false;
function clientCard(c){
  const s=summary(c);
  return `<div class="card pad hover row between wrap" style="gap:12px">
    <a class="row grow" style="gap:14px;min-width:220px" href="operacional-cliente.html?c=${c.id}">${U.avatarHtml(c,'lg')}
      <div class="col"><strong style="font-size:16px">${c.name}</strong>
        <span class="meta-sm">${s.total} conteúdos · ${s.prod} em produção · ${s.done} prontos</span></div></a>
    <div class="row" style="gap:8px">
      <a class="btn-icon card" title="Abrir" href="operacional-cliente.html?c=${c.id}">${U.icon('arrow')}</a>
      ${GESTOR?`<button class="btn-icon card" title="Arquivar cliente" onclick="arquivar('${c.id}')">${U.icon('archive')}</button>
      <button class="btn-icon card" title="Excluir cliente" onclick="excluir('${c.id}','${c.name.replace(/'/g,"\\'")}')">${U.icon('trash')}</button>`:''}
    </div>
  </div>`;
}
function archivedRow(c){
  return `<div class="card pad row between">
    <div class="row" style="gap:14px;opacity:.6">${U.avatarHtml(c,'')}
      <div class="col"><strong>${c.name}</strong><span class="meta-sm">${c.handle||''}</span></div></div>
    <div class="row" style="gap:8px">
      <button class="btn btn-sm card" onclick="reativar('${c.id}')">Reativar</button>
      <button class="btn-icon card" onclick="excluir('${c.id}','${c.name.replace(/'/g,"\\'")}')">${U.icon('trash')}</button>
    </div>
  </div>`;
}

function render(){
  GESTOR=U.isGestor();
  const home=U.homeHref();
  document.getElementById("homeLink").href=home;
  document.getElementById("homeNav").href=home;
  document.getElementById("homeNav").textContent = GESTOR?'← Hub':'← Minhas tarefas';
  document.getElementById("rolelbl").textContent = GESTOR?'gestor':'equipe';
  const clients=Data.activeClients();
  const arch=GESTOR?Data.archivedClients():[];
  document.getElementById("root").innerHTML=`
    <section class="section">
      <div class="eyebrow">Operacional</div>
      <h1 class="display" style="font-size:clamp(28px,5vw,44px)">Produção por cliente</h1>
      <p class="lead" style="margin-top:10px">Escolha um cliente para ver o processo de produção dele — etapas, prazos e responsáveis.</p>
    </section>
    <section class="section">
      <div class="col stagger" style="gap:14px">
        ${clients.length?clients.map(clientCard).join(''):'<div class="empty card pad">Nenhum cliente ativo.</div>'}
      </div>
      ${arch.length?`<div class="eyebrow" style="margin:28px 0 12px">Arquivados</div>
        <div class="col" style="gap:12px">${arch.map(archivedRow).join('')}</div>`:''}
    </section>`;
  U.reveal();
}
async function arquivar(id){ await Store.setArchived(id,true); U.toast('Cliente arquivado'); render(); }
async function reativar(id){ await Store.setArchived(id,false); U.toast('Cliente reativado'); render(); }
async function excluir(id,name){ if(!confirm('Excluir o cliente "'+name+'" e tudo dele? Não dá pra desfazer.')) return;
  await Store.deleteClient(id); U.toast('Cliente excluído'); render(); }
U.boot(render, {op:true});
</script>
</body>
</html>
