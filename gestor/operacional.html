<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>oFruto · Operacional</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="hub.html"><span class="dot"></span> oFruto <small>gestor</small></a>
    <nav class="topnav"><a href="hub.html">← Hub</a></nav>
  </div>
</header>

<main class="wrap pagepad" id="root"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const STAGES=(window.APP_CONFIG&&APP_CONFIG.PROD_STAGES)||["Ideia","Roteiro","Edição","Pronto"];
const TEAM=(window.APP_CONFIG&&APP_CONFIG.TEAM)||["Davi Moura"];
let FCLI='', FETA='', FRESP='';

function allItems(){
  const items=[];
  Data.activeClients().forEach(c=>c.projects.forEach(p=>p.posts.forEach(post=>{
    if(p.kind==='entrega') return;
    items.push({ c, p, post });
  })));
  return items;
}
function filtered(){
  return allItems().filter(x=>
    (!FCLI || x.c.id===FCLI) &&
    (!FETA || (x.post.prod||'—')===FETA) &&
    (!FRESP || x.post.responsavel===FRESP));
}

function card(x){
  const t=TYPE[x.post.type];
  const stageOpts=`<option value="">— etapa —</option>`+STAGES.map(s=>`<option ${x.post.prod===s?'selected':''}>${s}</option>`).join('');
  const respOpts=`<option value="">— responsável —</option>`+TEAM.map(m=>`<option ${x.post.responsavel===m?'selected':''}>${m}</option>`).join('');
  return `<div class="card pad" style="padding:14px">
    <div class="row between" style="gap:10px">
      <a class="row" style="gap:10px;min-width:0" href="projeto.html?c=${x.c.id}&p=${x.p.id}">
        ${U.avatarHtml(x.c,'')}
        <div class="col" style="min-width:0">
          <strong style="font-size:14px">${x.post.title}</strong>
          <span class="meta-sm">${x.c.name} · ${x.p.name} · ${t.label}${x.post.pilar?' · '+x.post.pilar:''}</span>
        </div>
      </a>
    </div>
    <div class="row" style="gap:8px;margin-top:12px">
      <select class="input" style="flex:1;padding:8px 10px" onchange="setEtapa('${x.c.id}','${x.p.id}','${x.post.id}',this.value)">${stageOpts}</select>
      <select class="input" style="flex:1;padding:8px 10px" onchange="setResp('${x.c.id}','${x.p.id}','${x.post.id}',this.value)">${respOpts}</select>
    </div>
  </div>`;
}

function render(){
  const items=filtered();
  const cliOpts=`<option value="">Todos os clientes</option>`+Data.activeClients().map(c=>`<option value="${c.id}" ${FCLI===c.id?'selected':''}>${c.name}</option>`).join('');
  const etaOpts=`<option value="">Todas as etapas</option>`+STAGES.map(s=>`<option ${FETA===s?'selected':''}>${s}</option>`).join('');
  const respOpts=`<option value="">Todos</option>`+TEAM.map(m=>`<option ${FRESP===m?'selected':''}>${m}</option>`).join('');

  // agrupa por etapa (na ordem do config), + "Sem etapa"
  const groups=[...STAGES.map(s=>({s,items:items.filter(x=>x.post.prod===s)})), {s:'Sem etapa', items:items.filter(x=>!x.post.prod)}];

  document.getElementById("root").innerHTML=`
    <section class="section">
      <div class="eyebrow">Operacional</div>
      <h1 class="display" style="font-size:clamp(28px,5vw,44px)">Produção de conteúdo</h1>
      <p class="lead" style="margin-top:10px">Todo conteúdo de todos os clientes, por etapa de produção e responsável.</p>
      <div class="row wrap" style="gap:10px;margin-top:16px">
        <select class="input" style="width:auto" onchange="FCLI=this.value;render()">${cliOpts}</select>
        <select class="input" style="width:auto" onchange="FETA=this.value;render()">${etaOpts}</select>
        <select class="input" style="width:auto" onchange="FRESP=this.value;render()">${respOpts}</select>
      </div>
    </section>

    <section class="section">
      ${items.length? groups.filter(g=>g.items.length).map(g=>`
        <div style="margin-bottom:26px">
          <div class="row between" style="margin-bottom:12px">
            <h2 class="display" style="font-size:20px">${g.s}</h2>
            <span class="badge">${g.items.length}</span>
          </div>
          <div class="grid c3">${g.items.map(card).join('')}</div>
        </div>`).join('')
      : '<div class="empty card pad">Nenhum conteúdo por aqui ainda.</div>'}
    </section>`;
}

async function setEtapa(cid,pid,id,val){ await Store.setPostMeta(cid,pid,id,{prod:val}); render(); }
async function setResp(cid,pid,id,val){ await Store.setPostMeta(cid,pid,id,{responsavel:val}); U.toast('Responsável atualizado'); }

U.boot(render, {manager:true});
</script>
</body>
</html>
