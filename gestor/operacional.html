<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>oFruto · Operacional</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="hub.html"><span class="dot"></span> oFruto <small>gestor</small></a>
    <nav class="topnav"><a href="hub.html">← Hub</a></nav>
  </div>
</header>

<main class="wrap pagepad" id="root"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const DONE=["Pronto","Postado"];
function summary(c){ let total=0,done=0;
  c.projects.forEach(p=>{ if(p.kind==='entrega') return; p.posts.forEach(x=>{ total++; if(DONE.includes(x.prod)) done++; }); });
  return {total, done, prod:total-done}; }

function clientCard(c){
  const s=summary(c);
  return `<a class="card pad hover row between" href="operacional-cliente.html?c=${c.id}">
    <div class="row" style="gap:14px">${U.avatarHtml(c,'lg')}
      <div class="col"><strong style="font-size:16px">${c.name}</strong>
        <span class="meta-sm">${s.total} conteúdos · ${s.prod} em produção · ${s.done} prontos</span></div></div>
    <span class="row" style="gap:6px">${U.icon('arrow')}</span>
  </a>`;
}

function render(){
  const clients=Data.activeClients();
  document.getElementById("root").innerHTML=`
    <section class="section">
      <div class="eyebrow">Operacional</div>
      <h1 class="display" style="font-size:clamp(28px,5vw,44px)">Produção por cliente</h1>
      <p class="lead" style="margin-top:10px">Escolha um cliente para ver o processo de produção dele — etapas, prazos e responsáveis.</p>
    </section>
    <section class="section">
      <div class="col stagger" style="gap:14px">
        ${clients.length?clients.map(clientCard).join(''):'<div class="empty card pad">Nenhum cliente ativo.</div>'}
      </div>
    </section>`;
  U.reveal();
}
U.boot(render, {manager:true});
</script>
</body>
</html>
