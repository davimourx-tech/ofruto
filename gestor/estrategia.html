<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>oFruto · Base Estratégica</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<header class="topbar">
  <div class="wrap">
    <a class="brand" href="hub.html"><span class="dot"></span> oFruto <small>gestor</small></a>
    <nav class="topnav" id="crumbs"></nav>
  </div>
</header>

<main class="wrap pagepad" id="root"></main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/data.js"></script>
<script>
const CID=U.qs("c");
let client;
function area(page,icon,title,sub){
  return `<a class="card hover pad areacard" href="${page}.html?c=${CID}">
    <span class="nic">${U.icon(icon)}</span>
    <div><strong style="font-size:16px">${title}</strong><div class="meta-sm">${sub}</div></div></a>`;
}
function render(){
  document.getElementById("crumbs").innerHTML=`<a href="cliente.html?c=${CID}">← ${client.name}</a>`;
  document.getElementById("root").innerHTML=`
    <section class="section">
      <a class="meta-sm" href="cliente.html?c=${CID}">← ${client.name}</a>
      <div class="eyebrow" style="margin:16px 0 0">Base estratégica</div>
      <div class="row" style="gap:18px;margin-top:8px">${U.avatarHtml(client,'lg')}
        <div class="col"><h1 class="display" style="font-size:clamp(26px,4.5vw,40px)">${client.name}</h1>
          <span class="muted">A fundação do cliente — define tudo que o operacional executa depois.</span></div></div>
    </section>
    <section class="section">
      <div class="grid c3 stagger">
        ${area('extracao','idea','Extração','Entrevista & base — as respostas do cliente')}
        ${area('diagnostico','sparkle','Diagnóstico','4 mapas gerados com IA a partir da extração')}
        ${area('matriz','grid','Matriz de conteúdo','Pilares, formatos & gerar o mês')}
      </div>
    </section>`;
  U.reveal();
}
function start(){
  client=Data.client(CID);
  if(!client){ document.getElementById("root").innerHTML='<div class="empty" style="padding-top:60px">Cliente não encontrado. <a href="hub.html">Voltar</a></div>'; return; }
  render();
}
U.boot(start, {manager:true});
</script>
</body>
</html>
